name: Encrypt and deploy to Pages

on:
  push:
    branches: [master]
  workflow_dispatch:
  workflow_run:
    # A push made with the default GITHUB_TOKEN (like the weekly report's
    # auto-commit) doesn't trigger the `push` event above, to prevent
    # infinite workflow loops — so listen for that workflow's completion
    # directly instead.
    workflows: ["ShipStation weekly report"]
    types: [completed]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Staticrypt
        run: npm install -g staticrypt

      - name: Encrypt all HTML files
        env:
          STATICRYPT_PASSWORD: ${{ secrets.CH_TOOLS_PW }}
        run: |
          if [ -z "$STATICRYPT_PASSWORD" ]; then
            echo "ERROR: STATICRYPT_PASSWORD is empty"
            exit 1
          fi
          find . -name "*.html" \
            -not -path "./.git/*" \
            -not -path "./node_modules/*" \
            -not -name ".staticrypt-template.html" \
            | while read f; do
              echo "Encrypting $f"
              staticrypt "$f" \
                --password "$STATICRYPT_PASSWORD" \
                -d "$(dirname "$f")" \
                --short \
                --template-title "Cheshire Horse Tools" \
                --template-instructions "Enter the tools password to continue." \
                --template-color-primary "#056A45" \
                --template-color-secondary "#034a31" \
                --template-button "LOGIN" \
                --remember 1 \
                || { echo "FAILED on $f"; exit 1; }
            done

      - name: Inject branded header
        run: python3 .github/inject_header.py

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - uses: actions/deploy-pages@v4
        id: deployment
