<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>RPH Review · 5/7/26 Concept</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Newsreader:ital,wght@0,400;0,600;1,400&family=JetBrains+Mono:wght@400;600&display=swap');

  :root {
    --bg: #f6f8f6;
    --paper: #ffffff;
    --ink: #1b231f;
    --ink-soft: #57645c;
    --ink-faint: #8a978f;
    --line: #dde4e0;
    --line-soft: #eef2ef;
    --accent: #056A45;        /* Cheshire Horse brand green */
    --accent-soft: #e3f3ec;
    --auto: #15803d;          /* auto-classified */
    --auto-soft: #dcf3e4;
    --drop: #57645c;          /* set aside / no match */
    --drop-soft: #eef2ef;
    --review: #92651b;        /* needs review */
    --review-soft: #fbf1de;
    --serif: 'Newsreader', Georgia, serif;
    --mono: 'JetBrains Mono', ui-monospace, Menlo, monospace;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    font-family: var(--serif);
    background: var(--bg);
    color: var(--ink);
    font-size: 15px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    display: flex;
    flex-direction: column;
  }

  /* ============ MASTHEAD ============ */
  .masthead {
    border-bottom: 2px solid var(--ink);
    padding: 18px 32px 14px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--paper);
    flex-wrap: wrap;
    gap: 12px;
    flex-shrink: 0;
  }
  .masthead-title {
    font-family: var(--serif);
    font-size: 28px;
    font-weight: 600;
    letter-spacing: -0.01em;
  }
  .masthead-title em {
    font-style: italic;
    color: var(--accent);
    font-weight: 400;
  }
  .masthead-meta {
    font-family: var(--mono);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--ink-soft);
  }

  /* ============ DASHBOARD STRIP ============ */
  .summary {
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    gap: 0;
    border-bottom: 1px solid var(--line);
    background: var(--paper);
    flex-shrink: 0;
  }
  .summary-cell {
    padding: 16px 20px;
    border-right: 1px solid var(--line-soft);
    cursor: pointer;
    transition: background 0.15s;
    position: relative;
  }
  .summary-cell:last-child { border-right: none; }
  .summary-cell:hover { background: #eef2ef; }
  .summary-cell.active::after {
    content: '';
    position: absolute;
    bottom: -1px; left: 0; right: 0;
    height: 3px;
    background: var(--ink);
  }
  .summary-cell .label {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--ink-faint);
    margin-bottom: 6px;
  }
  .summary-cell .count {
    font-size: 32px;
    font-weight: 600;
    line-height: 1;
    font-family: var(--serif);
  }
  .summary-cell .desc {
    font-size: 12px;
    color: var(--ink-soft);
    margin-top: 4px;
    font-style: italic;
  }
  .summary-cell.review .count { color: var(--review); }
  .summary-cell.auto .count { color: var(--auto); }
  .summary-cell.drop .count { color: var(--drop); }
  .summary-cell.approved .count { color: var(--accent); }

  /* ============ MAIN LAYOUT ============ */
  .main {
    display: grid;
    grid-template-columns: 380px 1fr 340px;
    flex: 1 1 auto;
    min-height: 0;
  }

  /* ============ QUEUE ============ */
  .queue {
    border-right: 1px solid var(--line);
    background: var(--paper);
    overflow-y: auto;
  }
  .queue-header {
    padding: 12px 16px 10px;
    border-bottom: 1px solid var(--line);
    background: var(--paper);
    position: sticky; top: 0;
    z-index: 2;
  }
  .queue-title {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--ink-soft);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .queue-title .filter-clear {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--accent);
    cursor: pointer;
    text-decoration: underline;
  }
  .queue-search {
    margin-top: 8px;
    width: 100%;
    border: 1px solid var(--line);
    background: var(--bg);
    padding: 6px 10px;
    font-family: var(--mono);
    font-size: 12px;
    color: var(--ink);
    outline: none;
  }
  .queue-search:focus { border-color: var(--ink); }

  .item {
    padding: 11px 16px;
    border-bottom: 1px solid var(--line-soft);
    cursor: pointer;
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 4px 8px;
    transition: background 0.1s;
  }
  .item:hover { background: #eef2ef; }
  .item.selected {
    background: var(--accent-soft);
    border-left: 3px solid var(--accent);
    padding-left: 13px;
  }
  .item.decided { opacity: 0.42; }
  .item.decided .item-desc { text-decoration: line-through; }

  .item-desc {
    font-family: var(--serif);
    font-size: 14px;
    font-weight: 600;
    line-height: 1.25;
    color: var(--ink);
    grid-column: 1 / 2;
  }
  .item-meta {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--ink-faint);
    grid-column: 1 / 2;
    letter-spacing: 0.02em;
  }
  .item-tag {
    grid-column: 2 / 3;
    grid-row: 1 / 3;
    align-self: center;
    font-family: var(--mono);
    font-size: 9px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    padding: 3px 6px;
    white-space: nowrap;
    border: 1px solid;
  }
  .tag-review { color: var(--review); border-color: var(--review); background: var(--review-soft); }
  .tag-auto { color: var(--auto); border-color: var(--auto); background: var(--auto-soft); }
  .tag-drop { color: var(--drop); border-color: var(--drop); background: var(--drop-soft); }
  .tag-approved { color: var(--accent); border-color: var(--accent); background: var(--accent-soft); }
  .tag-skipped { color: var(--ink-faint); border-color: var(--ink-faint); background: transparent; }

  .stock-badge {
    display: inline-block;
    margin-left: 6px;
    font-family: var(--mono);
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 0.03em;
    color: var(--accent);
    background: var(--accent-soft);
    border: 1px solid var(--accent);
    border-radius: 3px;
    padding: 1px 5px;
  }

  /* ============ DETAIL ============ */
  .detail {
    padding: 14px 48px 16px;
    overflow-y: auto;
    background: var(--bg);
  }
  .detail-empty {
    height: 100%;
    display: flex; align-items: center; justify-content: center;
    color: var(--ink-faint);
    font-style: italic;
    font-size: 16px;
  }
  .detail-eyebrow {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--ink-faint);
    margin-bottom: 8px;
  }
  .detail-headline {
    font-family: var(--serif);
    font-size: 26px;
    font-weight: 600;
    line-height: 1.15;
    letter-spacing: -0.01em;
    margin-bottom: 4px;
  }
  .detail-sub {
    font-family: var(--mono);
    font-size: 13px;
    color: var(--ink-soft);
    margin-bottom: 14px;
  }

  .verdict {
    border: 1px solid var(--line);
    background: var(--paper);
    padding: 8px 18px;
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .verdict-icon {
    width: 28px; height: 28px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-family: var(--mono);
    font-size: 13px;
    font-weight: 600;
    flex-shrink: 0;
  }
  .verdict-icon.auto { background: var(--auto-soft); color: var(--auto); border: 1px solid var(--auto); }
  .verdict-icon.review { background: var(--review-soft); color: var(--review); border: 1px solid var(--review); }
  .verdict-icon.drop { background: var(--drop-soft); color: var(--drop); border: 1px solid var(--drop); }
  .verdict-text { flex: 1; }
  .verdict-text strong { font-weight: 600; }
  .verdict-text .reason {
    display: block;
    font-size: 12px;
    color: var(--ink-soft);
    font-style: italic;
    margin-top: 2px;
  }

  .fields {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 0;
    border-top: 1px solid var(--line);
    border-left: 1px solid var(--line);
    margin-bottom: 14px;
  }
  .field {
    padding: 8px 14px;
    border-bottom: 1px solid var(--line);
    border-right: 1px solid var(--line);
  }
  .field-label {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--ink-faint);
    margin-bottom: 3px;
  }
  .field-value {
    font-family: var(--serif);
    font-size: 15px;
    color: var(--ink);
    word-break: break-word;
  }
  .field-value.mono { font-family: var(--mono); font-size: 13px; }
  .field-value.empty { color: var(--ink-faint); font-style: italic; }
  .field-value.highlight {
    color: var(--accent);
    font-weight: 700;
  }
  .field:has(.field-value.highlight) {
    background: var(--accent-soft);
  }

  .actions {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 12px;
  }
  .btn {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 8px 16px;
    border: 1px solid var(--ink);
    background: var(--paper);
    color: var(--ink);
    cursor: pointer;
    transition: all 0.1s;
  }
  .btn:hover { background: var(--ink); color: var(--paper); }
  .btn-primary { background: var(--accent); color: var(--paper); border-color: var(--accent); }
  .btn-primary:hover { background: #034a31; border-color: #034a31; color: var(--paper); }
  .btn-skip { color: var(--ink-soft); border-color: var(--line); }
  .btn-skip:hover { background: var(--ink-soft); color: var(--paper); border-color: var(--ink-soft); }

  .keyboard-hint {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--ink-faint);
    letter-spacing: 0.04em;
  }
  .keyboard-hint kbd {
    background: var(--paper);
    border: 1px solid var(--line);
    padding: 1px 5px;
    font-family: var(--mono);
    font-size: 10px;
    margin: 0 2px;
  }

  .class-rule-box {
    margin-top: 14px;
    margin-bottom: 8px;
    padding: 14px 16px;
    background: var(--paper);
    border: 1px dashed var(--ink-soft);
    scroll-margin-bottom: 24px;
  }
  .class-rule-box-title {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--ink-soft);
    margin-bottom: 8px;
  }
  .class-rule-box-body {
    font-size: 14px;
    margin-bottom: 10px;
  }
  .class-rule-box-body code {
    font-family: var(--mono);
    background: var(--bg);
    padding: 1px 5px;
    font-size: 12px;
  }
  .class-rule-actions { display: flex; gap: 6px; }
  .class-rule-actions .btn { padding: 6px 12px; font-size: 10px; }

  /* ============ SIDEBAR (LIBRARY) ============ */
  .sidebar {
    border-left: 1px solid var(--line);
    background: var(--paper);
    overflow-y: auto;
    padding: 20px 18px;
  }
  .sidebar-title {
    font-family: var(--serif);
    font-size: 18px;
    font-weight: 600;
    margin-bottom: 4px;
  }
  .sidebar-sub {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    color: var(--ink-faint);
    margin-bottom: 16px;
  }
  .rule-section { margin-bottom: 20px; }
  .rule-section h4 {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--ink-soft);
    margin-bottom: 6px;
    padding-bottom: 4px;
    border-bottom: 1px solid var(--line-soft);
  }
  .rule {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 4px 0;
    font-size: 12px;
  }
  .rule-class {
    font-family: var(--mono);
    color: var(--ink);
  }
  .rule-class .code { font-weight: 600; }
  .rule-class .name { color: var(--ink-soft); margin-left: 6px; }
  .rule-x {
    cursor: pointer;
    color: var(--ink-faint);
    font-family: var(--mono);
    font-size: 12px;
    padding: 0 4px;
  }
  .rule-x:hover { color: var(--accent); }
  .rule-empty {
    font-size: 12px;
    color: var(--ink-faint);
    font-style: italic;
  }

  .pub-section {
    border-top: 2px solid var(--ink);
    padding-top: 16px;
    margin-top: 24px;
  }
  .pub-bar {
    background: var(--accent);
    color: var(--paper);
    padding: 14px;
    margin-bottom: 8px;
  }
  .pub-bar .pub-count {
    font-family: var(--serif);
    font-size: 24px;
    font-weight: 600;
  }
  .pub-bar .pub-label {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    opacity: 0.85;
  }
  .pub-export {
    width: 100%;
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 12px;
    background: var(--ink);
    color: var(--paper);
    border: none;
    cursor: pointer;
  }
  .pub-export:hover { background: #000; }
  .pub-export:disabled {
    background: var(--line);
    color: var(--ink-faint);
    cursor: not-allowed;
  }

  /* ============ MISC ============ */
  .ornament {
    text-align: center;
    color: var(--ink-faint);
    margin: 12px 0;
    font-family: var(--serif);
  }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--line); border-radius: 4px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--ink-faint); }
</style>
</head>

// ============================================================
// STATE
// ============================================================
// In live mode (served by the Flask app), use server-injected state.
// In standalone demo mode (file:// open), fall back to the embedded RPH_DATA.
const _liveMode = !!window.LIVE_MODE;
const _initialRecords = _liveMode ? window.LIVE_STATE.records : window.RPH_DATA;
const _initialRules = _liveMode ? (window.LIVE_STATE.rules || {}) : {};
const _initialDecisions = _liveMode ? (window.LIVE_STATE.decisions || {}) : {};

const state = {
  items: _initialRecords.map(r => ({
    ...r,
    decision: _initialDecisions[r.item] || null,  // hydrate prior decisions
  })),
  classRules: {..._initialRules},  // class_code -> 'upload' | 'skip'
  selectedIdx: null,
  filter: null,
  search: '',
};

// Persist a decision to the server (no-op in standalone demo mode).
async function persistDecision(item, decision) {
  if (!_liveMode) return;
  try {
    await fetch('/api/decide', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({item, decision}),
    });
  } catch (err) {
    console.warn('Failed to persist decision:', err);
  }
}

// Persist a class rule to the server (no-op in standalone demo mode).
async function persistRule(class_code, kind) {
  if (!_liveMode) return;
  try {
    await fetch('/api/rule', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({class_code, kind}),
    });
  } catch (err) {
    console.warn('Failed to persist rule:', err);
  }
}

// Apply class rules to compute effective decision for review items
function effectiveDecision(item) {
  if (item.decision) return item.decision;
  // Auto-buckets get implicit decisions
  if (item.bucket === 'auto_c20') return 'approve';
  if (item.bucket.startsWith('drop_')) return 'skip';
  // Check class rule
  if (item.class_code && state.classRules[item.class_code]) {
    return state.classRules[item.class_code] === 'upload' ? 'approve' : 'skip';
  }
  return null;
}

function pendingReview(item) {
  return item.bucket.startsWith('review_') && effectiveDecision(item) === null;
}

// ============================================================
// RENDER: SUMMARY STRIP
// ============================================================
function renderSummary() {
  const cells = [
    { key: 'review_class',    label: 'Pending Review',    cls: 'review',   desc: 'Need your eyes' },
    { key: 'auto_c20',        label: 'Auto · C20',        cls: 'auto',     desc: 'Special orders' },
    { key: 'drop_coupon',     label: 'Drop · Coupon',     cls: 'drop',     desc: 'H1 / H2' },
    { key: 'drop_closeout',   label: 'Drop · Closeout',   cls: 'drop',     desc: 'Marked Y' },
    { key: 'drop_delivery',   label: 'Drop · Delivery',   cls: 'drop',     desc: 'Dept 80' },
    { key: '__approved__',    label: 'Decided',           cls: 'approved', desc: 'You + auto' },
  ];

  const counts = {};
  for (const c of cells) counts[c.key] = 0;

  for (const item of state.items) {
    if (item.bucket === 'review_class' && pendingReview(item)) counts['review_class']++;
    else if (counts[item.bucket] !== undefined) counts[item.bucket]++;
    if (effectiveDecision(item)) counts['__approved__']++;
  }

  const html = cells.map(c => `
    <div class="summary-cell ${c.cls} ${state.filter === c.key ? 'active' : ''}" data-filter="${c.key}">
      <div class="label">${c.label}</div>
      <div class="count">${counts[c.key]}</div>
      <div class="desc">${c.desc}</div>
    </div>
  `).join('');

  document.getElementById('summary').innerHTML = html;
  document.querySelectorAll('.summary-cell').forEach(el => {
    el.onclick = () => {
      const f = el.dataset.filter;
      state.filter = (state.filter === f) ? null : f;
      renderAll();
    };
  });
}

// ============================================================
// RENDER: QUEUE
// ============================================================
function getFilteredItems() {
  let items = state.items;

  if (state.filter === '__approved__') {
    items = items.filter(i => effectiveDecision(i) !== null);
  } else if (state.filter === 'review_class') {
    items = items.filter(i => i.bucket === 'review_class' && pendingReview(i));
  } else if (state.filter) {
    items = items.filter(i => i.bucket === state.filter);
  } else {
    // Default: show pending review + auto items not yet decided
    items = items.filter(i =>
      pendingReview(i) ||
      (i.bucket === 'auto_c20' && !i.decision) ||
      effectiveDecision(i) !== null
    );
  }

  if (state.search) {
    const q = state.search.toLowerCase();
    items = items.filter(i =>
      (i.item || '').toLowerCase().includes(q) ||
      (i.desc || '').toLowerCase().includes(q) ||
      (i.vendor || '').toLowerCase().includes(q) ||
      (i.class_code || '').toLowerCase().includes(q) ||
      (i.class_name || '').toLowerCase().includes(q)
    );
  }

  return items;
}

function renderQueue() {
  const items = getFilteredItems();
  const list = document.getElementById('queue-list');

  if (items.length === 0) {
    list.innerHTML = '<div class="ornament">— nothing here —</div>';
    return;
  }

  list.innerHTML = items.map((item, idx) => {
    const realIdx = state.items.indexOf(item);
    const decided = effectiveDecision(item);
    const tagClass = decided === 'approve' ? 'tag-approved'
                   : decided === 'skip' ? 'tag-skipped'
                   : item.bucket.startsWith('review_') ? 'tag-review'
                   : item.bucket.startsWith('drop_') ? 'tag-drop'
                   : 'tag-auto';
    const tagText = decided === 'approve' ? 'Approved'
                  : decided === 'skip' ? 'Skipped'
                  : item.bucket === 'review_class' ? 'Review'
                  : item.bucket === 'auto_c20' ? 'C20'
                  : item.bucket === 'drop_coupon' ? 'Coupon'
                  : item.bucket === 'drop_closeout' ? 'Closeout'
                  : item.bucket === 'drop_delivery' ? 'Delivery'
                  : 'Review';

    const meta = `${item.item} · ${item.vendor || '—'}${item.class_code ? ' · ' + item.class_code : ''}`;
    const qoh = item.qoh_cheshire || 0;
    const qoo = item.qoo_cheshire || 0;
    let stockBadge = '';
    if (qoh > 0 || qoo > 0) {
      const parts = [];
      if (qoh > 0) parts.push(`QOH ${qoh}`);
      if (qoo > 0) parts.push(`QOO ${qoo}`);
      stockBadge = `<span class="stock-badge">${escapeHtml(parts.join(' · '))}</span>`;
    }
    const klass = `item ${state.selectedIdx === realIdx ? 'selected' : ''} ${decided ? 'decided' : ''}`;
    return `
      <div class="${klass}" data-idx="${realIdx}">
        <div class="item-desc">${escapeHtml(item.desc || '(no description)')}</div>
        <div class="item-meta">${escapeHtml(meta)}${stockBadge}</div>
        <span class="item-tag ${tagClass}">${tagText}</span>
      </div>
    `;
  }).join('');

  list.querySelectorAll('.item').forEach(el => {
    el.onclick = () => selectItem(parseInt(el.dataset.idx));
  });

  // Queue header label
  let lbl = "Today's Queue";
  if (state.filter === 'review_class') lbl = 'Pending Review';
  else if (state.filter === '__approved__') lbl = 'Decided';
  else if (state.filter === 'auto_c20') lbl = 'Auto · C20';
  else if (state.filter === 'drop_coupon') lbl = 'Coupons';
  else if (state.filter === 'drop_closeout') lbl = 'Closeouts';
  else if (state.filter === 'drop_delivery') lbl = 'Delivery / System';
  document.getElementById('queue-label').textContent = `${lbl} · ${items.length}`;
  document.getElementById('filter-clear').style.display = state.filter ? 'inline' : 'none';
}

          <strong>Auto-drop:</strong> Coupon / promo (Dept ${escapeHtml(item.dept_code)})

          <strong>Auto-drop:</strong> Marked closeout
          <span class="reason">Store Closeout flag = Y. Won't be re-stocked.</span>
        </div>

  } else if (item.bucket === 'drop_delivery') {
    verdictHtml = `
      <div class="verdict">
        <div class="verdict-icon drop">D</div>
        <div class="verdict-text">
          <strong>Auto-drop:</strong> Delivery / system SKU (Dept 80)
          <span class="reason">Internal accounting item, not a product.</span>
        </div>

  } else {
    // Review needed
    const ruleHit = item.class_code && state.classRules[item.class_code];
    if (ruleHit) {
      verdictHtml = `
        <div class="verdict">
          <div class="verdict-icon ${ruleHit === 'upload' ? 'auto' : 'drop'}">${ruleHit === 'upload' ? 'A' : 'D'}</div>
          <div class="verdict-text">
            <strong>Class rule:</strong> ${ruleHit === 'upload' ? 'Always upload' : 'Always skip'} class ${item.class_code} ${escapeHtml(item.class_name)}
            <span class="reason">Decided previously. Override below if needed.</span>
          </div>
        </div>`;
    } else {
      verdictHtml = `
        <div class="verdict">
          <div class="verdict-icon review">?</div>
          <div class="verdict-text">
            <strong>Needs your judgment.</strong>
            <span class="reason">No class rule for ${escapeHtml(item.class_code || '?')} ${escapeHtml(item.class_name || '')} yet.</span>
          </div>
        </div>`;
    }
  }

  // Field grid
  const fields = [
    ['SKU',           item.item,           'mono'],
    ['UPC',           item.upc,            'mono'],
    ['MFG Part #',    item.mfg_part,       'mono'],
    ['Vendor',        item.vendor,         ''],
    ['Department',    item.dept_code ? `${item.dept_code} · ${item.dept_name}` : '', ''],
    ['Class',         item.class_code ? `${item.class_code} · ${item.class_name}` : '', ''],
    ['QOH (Cheshire)', item.qoh_cheshire.toString(), `mono${item.qoh_cheshire > 0 ? ' highlight' : ''}`],
    ['QOO (Cheshire)', (item.qoo_cheshire || 0).toString(), `mono${(item.qoo_cheshire || 0) > 0 ? ' highlight' : ''}`],
    ['Date Added',    item.date_added,     'mono'],
    ['List Price',    item.list_price ? `$${item.list_price.toFixed(2)}` : '', 'mono'],
    ['Retail Price',  item.retail_price ? `$${item.retail_price.toFixed(2)}` : '', 'mono'],
  ];
  const fieldsHtml = fields.map(([lbl, val, cls]) => `
    <div class="field">
      <div class="field-label">${lbl}</div>
      <div class="field-value ${cls} ${!val ? 'empty' : ''}">${escapeHtml(val || '—')}</div>
    </div>
  `).join('');

  // Action buttons depend on whether this is a manual review item
  let actionsHtml = '';
  let classRuleBox = '';
  if (item.bucket.startsWith('review_')) {
    const isApproved = item.decision === 'approve';
    const isSkipped = item.decision === 'skip';
    actionsHtml = `
      <div class="actions">
        <button class="btn btn-primary" id="btn-approve">${isApproved ? '✓ Approved' : 'Approve · Upload'}</button>

    if (item.class_code) {
      const existingRule = state.classRules[item.class_code];
      classRuleBox = `
        <div class="class-rule-box">
          <div class="class-rule-box-title">Persist a class rule</div>

    // Auto-decided items can still be overridden
    actionsHtml = `
      <div class="actions">
        <button class="btn" id="btn-override">Override decision</button>
      </div>
    `;
  }

  detail.innerHTML = `
    <div class="detail-eyebrow">${escapeHtml(item.bucket_label)}</div>
    <h1 class="detail-headline">${escapeHtml(item.desc || '(no description)')}</h1>
    <div class="detail-sub">SKU ${escapeHtml(item.item)} &middot; ${escapeHtml(item.vendor || 'no vendor')}</div>
    ${verdictHtml}
    <div class="fields">${fieldsHtml}</div>
    ${actionsHtml}
    ${classRuleBox}
  `;

  // Wire up buttons
  const approve = document.getElementById('btn-approve');
  const skip = document.getElementById('btn-skip');
  const clear = document.getElementById('btn-clear');
  const override = document.getElementById('btn-override');
  if (approve) approve.onclick = () => decide('approve');
  if (skip) skip.onclick = () => decide('skip');
  if (clear) clear.onclick = () => decide(null);
  if (override) override.onclick = () => {
    const verdict = item.bucket === 'auto_c20' ? 'skip' : 'approve';
    item.decision = verdict;
    persistDecision(item.item, verdict);
    renderAll();
  };
  const ruleU = document.getElementById('rule-upload');
  const ruleS = document.getElementById('rule-skip');
  const ruleR = document.getElementById('rule-remove');
  if (ruleU) ruleU.onclick = () => setClassRule(item.class_code, 'upload');
  if (ruleS) ruleS.onclick = () => setClassRule(item.class_code, 'skip');
  if (ruleR) ruleR.onclick = () => removeClassRule(item.class_code);
}

// ============================================================
// RENDER: SIDEBAR (rule library + publish)
// ============================================================
function renderSidebar() {
  const upload = [], skip = [];
  for (const [code, kind] of Object.entries(state.classRules)) {
    // Look up the class name from any item
    const itm = state.items.find(i => i.class_code === code);
    const name = itm ? itm.class_name : '';
    (kind === 'upload' ? upload : skip).push({ code, name });
  }
  upload.sort((a,b) => a.code.localeCompare(b.code));
  skip.sort((a,b) => a.code.localeCompare(b.code));

  const renderList = (rules) => {
    if (rules.length === 0) return '<div class="rule-empty">No rules yet</div>';
    return rules.map(r => `
      <div class="rule">
        <div class="rule-class"><span class="code">${escapeHtml(r.code)}</span><span class="name">${escapeHtml(r.name)}</span></div>
        <span class="rule-x" data-code="${escapeHtml(r.code)}">×</span>
      </div>
    `).join('');
  };

  document.getElementById('rules-upload').innerHTML = renderList(upload);
  document.getElementById('rules-skip').innerHTML = renderList(skip);
  document.getElementById('upload-count').textContent = upload.length;
  document.getElementById('skip-count').textContent = skip.length;

  document.querySelectorAll('.rule-x').forEach(el => {
    el.onclick = () => removeClassRule(el.dataset.code);
  });

  // Publish bar
  const approvedCount = state.items.filter(i => effectiveDecision(i) === 'approve').length;
  document.getElementById('pub-count').textContent = approvedCount;
  const exportBtn = document.getElementById('pub-export');
  exportBtn.disabled = approvedCount === 0;
  exportBtn.onclick = exportApproved;
}

// ============================================================
// ACTIONS
// ============================================================
function selectItem(idx) {
  state.selectedIdx = idx;
  renderQueue();
  renderDetail();
}

function decide(verdict) {
  if (state.selectedIdx === null) return;
  const item = state.items[state.selectedIdx];
  item.decision = verdict;
  persistDecision(item.item, verdict);  // fire-and-forget; UI updates immediately
  // Auto-advance to next pending review
  if (verdict !== null) {
    advanceToNextPending();
  }
  renderAll();
}

function advanceToNextPending() {
  const items = getFilteredItems();
  const curRealIdx = state.selectedIdx;
  const curIdxInList = items.findIndex(i => state.items.indexOf(i) === curRealIdx);
  for (let i = curIdxInList + 1; i < items.length; i++) {
    if (pendingReview(items[i])) {
      state.selectedIdx = state.items.indexOf(items[i]);
      return;
    }
  }
  // Wrap or stay
  for (let i = 0; i < curIdxInList; i++) {
    if (pendingReview(items[i])) {
      state.selectedIdx = state.items.indexOf(items[i]);
      return;
    }
  }
}

function setClassRule(code, kind) {
  state.classRules[code] = kind;
  persistRule(code, kind);
  renderAll();
}
function removeClassRule(code) {
  delete state.classRules[code];
  persistRule(code, null);
  renderAll();
}

function exportApproved() {
  const approved = state.items.filter(i => effectiveDecision(i) === 'approve');
  const headers = ['Item Number', 'Description', 'Vendor', 'UPC', 'MFG Part #', 'Department', 'Class', 'List Price', 'Retail Price', 'QOH Cheshire', 'QOO Cheshire', 'Decision Source'];
  const rows = approved.map(i => [
    i.item,
    i.desc,
    i.vendor,
    i.upc,
    i.mfg_part,
    i.dept_code + ' ' + i.dept_name,
    i.class_code + ' ' + i.class_name,
    i.list_price,
    i.retail_price,
    i.qoh_cheshire,
    i.qoo_cheshire || 0,
    i.decision === 'approve' ? 'manual' : i.bucket === 'auto_c20' ? 'auto C20' : 'class rule',
  ]);
  const csv = [headers, ...rows].map(r => r.map(cell => {
    const s = String(cell ?? '');
    return /[",\n]/.test(s) ? `"${s.replace(/"/g, '""')}"` : s;
  }).join(',')).join('\n');
  const blob = new Blob([csv], { type: 'text/csv' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `RPH_approved_${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
  URL.revokeObjectURL(url);
}

function escapeHtml(s) {
  if (s === null || s === undefined) return '';
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

// ============================================================
// KEYBOARD SHORTCUTS
// ============================================================
document.addEventListener('keydown', (e) => {
  if (e.target.tagName === 'INPUT') return;
  if (state.selectedIdx === null) return;
  const item = state.items[state.selectedIdx];

  if (e.key === 'a' || e.key === 'A') {
    if (item.bucket.startsWith('review_')) decide('approve');
  } else if (e.key === 's' || e.key === 'S') {
    if (item.bucket.startsWith('review_')) decide('skip');
  } else if (e.key === 'ArrowDown') {
    e.preventDefault();
    const items = getFilteredItems();
    const cur = items.findIndex(i => state.items.indexOf(i) === state.selectedIdx);
    if (cur < items.length - 1) selectItem(state.items.indexOf(items[cur + 1]));
  } else if (e.key === 'ArrowUp') {
    e.preventDefault();
    const items = getFilteredItems();
    const cur = items.findIndex(i => state.items.indexOf(i) === state.selectedIdx);
    if (cur > 0) selectItem(state.items.indexOf(items[cur - 1]));
  }
});

// ============================================================
// SEARCH + FILTER CLEAR
// ============================================================
document.getElementById('search').addEventListener('input', (e) => {
  state.search = e.target.value;
  renderQueue();
});
document.getElementById('filter-clear').onclick = () => {
  state.filter = null;
  renderAll();
};

// ============================================================
// MAIN RENDER
// ============================================================
function renderAll() {
  renderSummary();
  renderQueue();
  renderDetail();
  renderSidebar();
}

// Auto-select first review item on load
const firstReview = state.items.findIndex(i => pendingReview(i));
if (firstReview >= 0) state.selectedIdx = firstReview;

renderAll();
</script>
