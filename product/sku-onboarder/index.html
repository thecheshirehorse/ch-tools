function getVariationAttrs(category) {
  // Check sub-category overrides first
  if (category && VARIATION_ATTR_OVERRIDES[category]) {
    // Find the parent top-level category for the base mapping
    const parentMap = findParentCategoryMap(category);
    return { ...parentMap, ...VARIATION_ATTR_OVERRIDES[category] };
  }
  // Check direct top-level match
  if (category && VARIATION_ATTR_MAP[category]) {
    return VARIATION_ATTR_MAP[category];
  }
  // Walk up to find parent
  return findParentCategoryMap(category) || { color: "color", size: "size" };
}

function findParentCategoryMap(catId) {
  if (!catId) return { color: "color", size: "size" };
  for (const top of CATEGORIES) {
    if (top.id === catId) return VARIATION_ATTR_MAP[top.id] || { color: "color", size: "size" };
    for (const mid of (top.children || [])) {
      if (mid.id === catId) return VARIATION_ATTR_MAP[top.id] || { color: "color", size: "size" };
      for (const leaf of (mid.children || [])) {
        if (leaf.id === catId) {
          // Check if mid-level has an override
          if (VARIATION_ATTR_OVERRIDES[mid.id]) {
            return { ...(VARIATION_ATTR_MAP[top.id] || { color: "color", size: "size" }), ...VARIATION_ATTR_OVERRIDES[mid.id] };
          }
          return VARIATION_ATTR_MAP[top.id] || { color: "color", size: "size" };
        }
      }
    }
  }
  return { color: "color", size: "size" };
}

    if (result && result.value) {
      const saved = JSON.parse(result.value);
      return {
        classRules: { ...DEFAULT_RULES.classRules, ...saved.classRules },
        deptRules: { ...DEFAULT_RULES.deptRules, ...saved.deptRules },

}

function classifyItem(item, rules) {
  const sku = (item.sku || "").toUpperCase();
  const vendor = (item.vendor || "").toUpperCase().trim();
  const closeout = (item.closeout || "").toUpperCase();
  const dept = (item.deptCode || "").toUpperCase().trim();
  const klass = (item.classCode || "").toUpperCase().trim();
  const retail = item.retailPrice || 0;

  if (rules.skuRules[sku]) {
    const r = rules.skuRules[sku];
    if (r.action === "upload") return { bucket: "auto", reason: `SKU rule: ${r.name}`, ruleType: "sku" };
    if (r.action === "drop") return { bucket: "drop", reason: `SKU rule: ${r.name}`, ruleType: "sku" };
  }
  if (vendor === "BLANK") return { bucket: "drop", reason: "Blank vendor", ruleType: "hard" };
  if (retail <= 0) return { bucket: "drop", reason: "$0 retail price", ruleType: "hard" };
  if (closeout === "Y") return { bucket: "drop", reason: "Store closeout", ruleType: "hard" };
  for (const [prefix, rule] of Object.entries(rules.prefixRules)) {
    if (sku.startsWith(prefix.toUpperCase())) {
      if (rule.action === "drop") return { bucket: "drop", reason: `${rule.name} (${prefix}*)`, ruleType: "prefix" };
      if (rule.action === "upload") return { bucket: "auto", reason: `${rule.name} (${prefix}*)`, ruleType: "prefix" };
    }
  }
  if (vendor && rules.vendorRules[vendor]) {
    const r = rules.vendorRules[vendor];
    if (r.action === "drop") return { bucket: "drop", reason: `Vendor: ${r.name}`, ruleType: "vendor" };
    if (r.action === "upload") return { bucket: "auto", reason: `Vendor: ${r.name}`, ruleType: "vendor" };
  }
  if (dept && rules.deptRules[dept]) {
    const r = rules.deptRules[dept];
    if (r.action === "drop") return { bucket: "drop", reason: `${r.name} (dept ${dept})`, ruleType: "dept" };
    if (r.action === "upload") return { bucket: "auto", reason: `${r.name} (dept ${dept})`, ruleType: "dept" };
  }
  if (klass && rules.classRules[klass]) {
    const r = rules.classRules[klass];
    if (r.action === "upload") return { bucket: "auto", reason: `${r.name}`, ruleType: "class" };
    if (r.action === "drop") return { bucket: "drop", reason: `Class skip: ${r.name}`, ruleType: "class" };
  }
  return { bucket: "review", reason: "", ruleType: "" };
}


/* ─── helpers ─── */
function escXml(s) { return s ? String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;") : ""; }
function titleCase(str) { return str ? str.toLowerCase().replace(/(?:^|\s|[-/])\w/g, m => m.toUpperCase()) : ""; }

function extractVariantLabel(description, baseName) {
  if (!description || !baseName) return description || "";
  const desc = description.toUpperCase().trim(), base = baseName.toUpperCase().trim();
  if (desc.startsWith(base)) { const s = description.slice(baseName.length).trim(); return s || description; }
  const dw = desc.split(/\s+/), bw = base.split(/\s+/);
  let ov = 0;
  for (let i = 0; i < Math.min(dw.length, bw.length); i++) { if (dw[i]===bw[i]) ov=i+1; else break; }
  return ov > 0 ? dw.slice(ov).join(" ") || description : description;
}

function findCommonSkuPrefix(skus) {
  if (skus.length < 2) return skus[0]||"";
  const s=[...skus].sort(); let i=0;
  while (i<s[0].length && s[0][i]===s[s.length-1][i]) i++;
  return s[0].slice(0,i);
}

function findCommonDescPrefix(descs) {
  if (descs.length < 2) return descs[0]||"";
  const w0=descs[0].split(/\s+/); let sh=w0.length;
  for (let d=1; d<descs.length; d++) { const w=descs[d].split(/\s+/); let m=0; for(let i=0;i<Math.min(sh,w.length);i++){if(w[i].toUpperCase()===w0[i].toUpperCase())m++;else break;}sh=m; }
  return w0.slice(0,sh).join(" ");
}


/* ─── file parsing ─── */
function parseXlsFile(buffer, rules) {
  const wb = XLSX.read(buffer, { type: "array", cellDates: true });
  const ws = wb.Sheets[wb.SheetNames[0]];
  const raw = XLSX.utils.sheet_to_json(ws, { defval: "" });

  const colMap = {};
  const first = raw[0] || {};
  for (const k of Object.keys(first)) {
    const lk = k.toLowerCase().replace(/\n/g, " ").trim();
    if (lk.includes("item number")) colMap.sku = k;
    else if (lk.includes("item description")) colMap.name = k;
    else if (lk.includes("mfg part")) colMap.mfg = k;
    else if (lk.includes("upc")) colMap.upc = k;
    else if (lk.includes("weight")) colMap.weight = k;
    else if (lk.includes("vendor name")) colMap.vendor = k;
    else if (lk.includes("closeout")) colMap.closeout = k;
    else if (lk.includes("date added")) colMap.dateAdded = k;
    else if (lk.includes("quantity on hand")) colMap.qoh = k;
    else if (lk.includes("quantity on order")) colMap.qoo = k;
    else if (lk.includes("tax")) colMap.tax = k;
    else if (lk.includes("list price")) colMap.listPrice = k;
    else if (lk.includes("retail price")) colMap.retailPrice = k;
    else if (lk.includes("vendor code")) colMap.vendorCode = k;
    else if (lk.includes("department code")||lk.includes("dept code")) colMap.deptCode = k;
    else if (lk.includes("department name")||lk.includes("dept name")) colMap.deptName = k;
    else if (lk.includes("class code")) colMap.classCode = k;
    else if (lk.includes("class name")) colMap.className = k;
  }

  const hasEnrichment = !!(colMap.deptCode || colMap.classCode);
  const grouped = {};
  for (const row of raw) {
    const sku = String(row[colMap.sku]||"").trim();
    if (!sku) continue;
    if (!grouped[sku]) {
      grouped[sku] = {
        sku, name: String(row[colMap.name]||"").trim(), mfg: String(row[colMap.mfg]||"").trim(),
        upcs: [], weight: parseFloat(row[colMap.weight])||0,
        vendor: String(row[colMap.vendor]||"").trim(),
        vendorCode: colMap.vendorCode ? String(row[colMap.vendorCode]||"").trim() : "",
        closeout: String(row[colMap.closeout]||"").trim(),
        dateAdded: row[colMap.dateAdded]||"",
        qoh: parseFloat(row[colMap.qoh])||0, qoo: parseFloat(row[colMap.qoo])||0,
        tax: colMap.tax ? String(row[colMap.tax]||"").trim() : "",
        listPrice: parseFloat(row[colMap.listPrice])||0,
        retailPrice: parseFloat(row[colMap.retailPrice])||0,
        deptCode: colMap.deptCode ? String(row[colMap.deptCode]||"").trim() : "",
        deptName: colMap.deptName ? String(row[colMap.deptName]||"").trim() : "",
        classCode: colMap.classCode ? String(row[colMap.classCode]||"").trim() : "",
        className: colMap.className ? String(row[colMap.className]||"").trim() : "",
      };
    }
    const upc = String(row[colMap.upc]||"").trim();
    if (upc && !grouped[sku].upcs.includes(upc)) grouped[sku].upcs.push(upc);
  }

  const allItems = Object.values(grouped);
  const drops = [], autoUploads = [], review = [];
  for (const item of allItems) {
    const c = classifyItem(item, rules);
    item._bucket = c.bucket; item._reason = c.reason; item._ruleType = c.ruleType;
    if (c.bucket === "drop") drops.push(item);
    else if (c.bucket === "auto") autoUploads.push(item);
    else review.push(item);
  }

  // Auto-approved items are pre-selected; review items start unselected
  const autoProducts = autoUploads.map(item => ({
    ...item, displayName: titleCase(item.name), category: "",
    selected: true, description: "",
    groupId: null, variationType: "", variantValue: "",
  }));
  const reviewProducts = review.map(item => ({
    ...item, displayName: titleCase(item.name), category: "",
    selected: false, description: "",
    groupId: null, variationType: "", variantValue: "",
  }));

  autoProducts.sort((a, b) => a.name.localeCompare(b.name));
  reviewProducts.sort((a, b) => a.name.localeCompare(b.name));

  return {
    products: [...autoProducts, ...reviewProducts],
    drops,
    autoCount: autoUploads.length,
    reviewCount: review.length,
    totalRaw: raw.length,
    uniqueSkus: allItems.length,
    hasEnrichment,
  };
}


/* ─── XML generation ─── */
function generateCatalogXml(products, groups) {
  let xml = `<?xml version="1.0" encoding="UTF-8"?>\n<catalog xmlns="http://www.demandware.com/xml/impex/catalog/2006-10-31" catalog-id="${CATALOG_ID}">\n\n`;
  for (const p of products) { if (!p.selected || p.groupId) continue; xml += bpx(p); }
  for (const g of groups) {
    const members = products.filter(p => p.selected && p.groupId === g.id);
    if (!members.length) continue;
    const bid = g.id + "x";
    xml += `  <product product-id="${escXml(bid)}">\n    <display-name xml:lang="x-default">${escXml(g.displayName)}</display-name>\n`;
    if (g.description) xml += `    <short-description xml:lang="x-default">${escXml(g.description)}</short-description>\n`;
    xml += `    <online-flag>true</online-flag>\n    <searchable-flag>true</searchable-flag>\n`;
    if (g.brand) xml += `    <brand>${escXml(g.brand)}</brand>\n`;
    if (g.tax) xml += `    <tax-class-id>${TAX_MAP[g.tax]||"standard"}</tax-class-id>\n`;
    xml += `    <variations>\n      <attributes>\n`;
    const vAttrs = getVariationAttrs(g.category);
    if (g.variationType==="color"||g.variationType==="color-size") {
      const colorAttrId = g.colorAttrOverride || vAttrs.color;
      xml += `        <variation-attribute attribute-id="${colorAttrId}" variation-attribute-id="${colorAttrId}">\n          <display-name xml:lang="x-default">Color</display-name>\n          <variation-attribute-values>\n`;
      [...new Set(members.map(m=>m.variantColor||m.variantValue).filter(Boolean))].forEach(c => { xml += `            <variation-attribute-value value="${escXml(c)}"><display-value xml:lang="x-default">${escXml(titleCase(c))}</display-value></variation-attribute-value>\n`; });
      xml += `          </variation-attribute-values>\n        </variation-attribute>\n`;
    }
    if (g.variationType==="size"||g.variationType==="color-size") {
      const sizeAttrId = g.sizeAttrOverride || vAttrs.size;
      xml += `        <variation-attribute attribute-id="${sizeAttrId}" variation-attribute-id="${sizeAttrId}">\n          <display-name xml:lang="x-default">Size</display-name>\n          <variation-attribute-values>\n`;
      [...new Set(members.map(m=>m.variantSize||m.variantValue).filter(Boolean))].forEach(s => { xml += `            <variation-attribute-value value="${escXml(s)}"><display-value xml:lang="x-default">${escXml(s)}</display-value></variation-attribute-value>\n`; });
      xml += `          </variation-attribute-values>\n        </variation-attribute>\n`;
    }
    xml += `      </attributes>\n      <variants>\n`;
    members.forEach(m => { xml += `        <variant product-id="${escXml(m.sku)}"/>\n`; });
    xml += `      </variants>\n    </variations>\n  </product>\n\n`;
    members.forEach(m => { xml += bpx(m, g); });
  }
  const ca = [];
  for (const p of products) { if (!p.selected||!p.category) continue; if (p.groupId) { const bid=p.groupId+"x"; if(!ca.find(a=>a.c===p.category&&a.p===bid)) ca.push({c:p.category,p:bid}); } else ca.push({c:p.category,p:p.sku}); }
  for (const g of groups) { if(g.category){const bid=g.id+"x"; if(!ca.find(a=>a.c===g.category&&a.p===bid)) ca.push({c:g.category,p:bid});} }
  if (ca.length) { xml += "\n"; ca.forEach(a => { xml += `  <category-assignment category-id="${escXml(a.c)}" product-id="${escXml(a.p)}">\n    <primary-flag>true</primary-flag>\n  </category-assignment>\n`; }); }
  return xml + "\n</catalog>";
}

function bpx(p, g) {
  let x = `  <product product-id="${escXml(p.sku)}">\n    <display-name xml:lang="x-default">${escXml(p.displayName)}</display-name>\n`;
  if (p.description) x += `    <short-description xml:lang="x-default">${escXml(p.description)}</short-description>\n`;
  x += `    <online-flag>true</online-flag>\n    <searchable-flag>${g?"false":"true"}</searchable-flag>\n`;
  if (p.upcs.length) x += `    <upc>${escXml(p.upcs[0])}</upc>\n`;
  if (p.mfg) x += `    <manufacturer-sku>${escXml(p.mfg)}</manufacturer-sku>\n`;
  if (!g && p.vendor) x += `    <brand>${escXml(p.vendor)}</brand>\n`;
  if (!g && p.tax) x += `    <tax-class-id>${TAX_MAP[p.tax]||"standard"}</tax-class-id>\n`;
  if (p.weight > 0) x += `    <custom-attributes>\n      <custom-attribute attribute-id="weight">${p.weight}</custom-attribute>\n    </custom-attributes>\n`;
  return x + `  </product>\n\n`;
}

function generatePricebookXml(products) {
  let xml = `<?xml version="1.0" encoding="UTF-8"?>\n<pricebooks xmlns="http://www.demandware.com/xml/impex/pricebook/2006-10-31">\n  <pricebook>\n    <header pricebook-id="${PRICEBOOK_ID}">\n      <display-name xml:lang="x-default">List Prices</display-name>\n      <currency>USD</currency>\n    </header>\n    <price-tables>\n`;
  for (const p of products) { if (!p.selected||p.retailPrice<=0) continue; xml += `      <price-table product-id="${escXml(p.sku)}">\n        <amount quantity="1">${p.retailPrice.toFixed(2)}</amount>\n      </price-table>\n`; }
  return xml + `    </price-tables>\n  </pricebook>\n</pricebooks>`;
}

function downloadFile(c, f) { const b=new Blob([c],{type:"application/xml"}),u=URL.createObjectURL(b),a=document.createElement("a"); a.href=u;a.download=f;document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(u); }
function catLabel(id) {
  for (const g of CATEGORIES) {

    for (const c of (g.children||[])) {
      if (c.id === id) return c.label;

function CategorySelect({value,onChange,className}) {
  const [open, setOpen] = useState(false);
  const [search, setSearch] = useState("");
  const [expanded, setExpanded] = useState({});
  const ref = useRef();

  // Close on outside click
  useEffect(() => {
    if (!open) return;
    const handler = (e) => { if (ref.current && !ref.current.contains(e.target)) setOpen(false); };
    document.addEventListener("mousedown", handler);
    return () => document.removeEventListener("mousedown", handler);
  }, [open]);

  const toggleExpand = (id) => setExpanded(prev => ({ ...prev, [id]: !prev[id] }));

  const select = (id) => { onChange(id); setOpen(false); setSearch(""); };

  // Flatten for search
  const matchesSearch = (label) => !search || label.toLowerCase().includes(search.toLowerCase());

  // Build full breadcrumb label for selected value
  const selectedLabel = useMemo(() => {
    if (!value) return "";
    for (const g of CATEGORIES) {
      if (g.id === value) return g.label;
      for (const c of (g.children||[])) {
        if (c.id === value) return `${g.label} › ${c.label}`;
        for (const s of (c.children||[])) {
          if (s.id === value) return `${g.label} › ${c.label} › ${s.label}`;
        }
      }
    }
    return value;
  }, [value]);

  // When searching, auto-expand matching parents
  const searchLC = search.toLowerCase();
  const shouldShow = (cat, depth) => {
    if (!search) return true;
    if (cat.label.toLowerCase().includes(searchLC)) return true;
    if (cat.children) return cat.children.some(c => shouldShow(c, depth+1));
    return false;
  };
  const isSearchExpanded = (cat) => {
    if (!search) return expanded[cat.id];
    return cat.children && cat.children.some(c => shouldShow(c, 1));
  };

  const renderNode = (cat, depth) => {
    if (!shouldShow(cat, depth)) return null;
    const hasKids = cat.children && cat.children.length > 0;
    const isExp = isSearchExpanded(cat);
    const isSelected = value === cat.id;
    const pad = depth * 16;

    return (
      <div key={cat.id}>
        <div
          className={`cat-node ${isSelected ? "cat-sel" : ""}`}
          style={{ paddingLeft: 8 + pad }}
          onClick={(e) => { e.stopPropagation(); if (hasKids) toggleExpand(cat.id); else select(cat.id); }}
        >
          {hasKids ? (
            <span className="cat-arrow" onClick={(e) => { e.stopPropagation(); toggleExpand(cat.id); }}>
              {isExp ? "▾" : "▸"}
            </span>
          ) : <span className="cat-dot">•</span>}
          <span className="cat-lbl" style={{ fontWeight: depth === 0 ? 600 : depth === 1 && hasKids ? 500 : 400 }}>
            {cat.label}
          </span>
          {hasKids && (
            <button className="cat-pick" onClick={(e) => { e.stopPropagation(); select(cat.id); }} title={`Assign to ${cat.label}`}>
              ✓
            </button>
          )}
        </div>
        {hasKids && isExp && (
          <div>{cat.children.map(c => renderNode(c, depth + 1))}</div>
        )}
      </div>
    );
  };

  return (
    <div ref={ref} style={{ position: "relative", display: "inline-block", minWidth: 220 }}>
      <button
        className={`fi cat-trigger ${className||""} ${!value ? "iw" : ""}`}
        onClick={() => setOpen(!open)}
        style={{ width: "100%", textAlign: "left", display: "flex", alignItems: "center", justifyContent: "space-between", gap: 8, cursor: "pointer" }}
      >
        <span style={{ overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap", flex: 1, fontSize: 12 }}>
          {value ? selectedLabel : "— Select Category —"}
        </span>
        <span style={{ fontSize: 10, color: "#8a978f", flexShrink: 0 }}>{open ? "▲" : "▼"}</span>
      </button>
      {open && (
        <div className="cat-dropdown">
          <input
            className="fi cat-search"
            placeholder="Search categories..."
            value={search}
            onChange={e => setSearch(e.target.value)}
            autoFocus
            onClick={e => e.stopPropagation()}
          />
          {value && (
            <div className="cat-node cat-clear" style={{ paddingLeft: 8 }} onClick={() => select("")}>
              <span className="cat-dot" style={{ color: "#c0392b" }}>✕</span>
              <span className="cat-lbl" style={{ color: "#c0392b" }}>Clear category</span>
            </div>
          )}
          <div className="cat-tree">
            {CATEGORIES.map(g => renderNode(g, 0))}
          </div>
        </div>
      )}
    </div>
  );
}


/* ═══════════════════════════════════════════════════
   STEP 0: Upload
   ═══════════════════════════════════════════════════ */
function UploadStep({ onData, rules, rulesLoaded }) {
  const [dragging, setDragging] = useState(false);
  const fileRef = useRef();
  const handleFile = useCallback((file) => {
    if (!file || !rulesLoaded) return;
    const reader = new FileReader();
    reader.onload = (e) => {
      try { onData(parseXlsFile(new Uint8Array(e.target.result), rules)); }
      catch (err) { alert("Error reading file: " + err.message); }
    };
    reader.readAsArrayBuffer(file);
  }, [onData, rules, rulesLoaded]);

  return (
    <div style={{ textAlign: "center", padding: "60px 20px" }}>
      <div style={{ fontSize: 48, marginBottom: 16, opacity: 0.4 }}>📦</div>
      <h2 style={{ margin: "0 0 8px", color: "#1b231f", fontSize: 22 }}>Upload KW/IMU Export</h2>
      <p style={{ color: "#57645c", marginBottom: 8, fontSize: 14 }}>Drop your .xls or .xlsx RPH report from Eagle</p>
      {rulesLoaded && <p style={{ color: "#15803d", fontSize: 12, marginBottom: 20 }}>✓ {Object.keys(rules.classRules).length + Object.keys(rules.vendorRules).length + Object.keys(rules.skuRules).length + Object.keys(rules.prefixRules).length + Object.keys(rules.deptRules).length} rules loaded</p>}
      <div className={`dz ${dragging?"dz-a":""}`}
        onDragOver={e=>{e.preventDefault();setDragging(true);}} onDragLeave={()=>setDragging(false)}
        onDrop={e=>{e.preventDefault();setDragging(false);handleFile(e.dataTransfer.files[0]);}}
        onClick={()=>fileRef.current?.click()}>
        <span style={{ fontSize: 14, color: "#57645c" }}>{dragging ? "Drop it here" : "Click or drag file here"}</span>
        <span style={{ fontSize: 12, color: "#8a978f", marginTop: 6 }}>.xls or .xlsx · RPH export from KW/IMU</span>
        <input ref={fileRef} type="file" accept=".xls,.xlsx,.csv" hidden onChange={e=>handleFile(e.target.files[0])} />
      </div>
    </div>
  );
}

function CascadeStep({ products, drops, stats, onUpdate, onNext, rules, onSaveRule, onRescue }) {
  const [showDrops, setShowDrops] = useState(false);
  const [showAuto, setShowAuto] = useState(false);
  const [rescuePrompt, setRescuePrompt] = useState(null);

  const autoProducts = useMemo(() => products.filter(p => p._bucket === "auto"), [products]);
  const reviewProducts = useMemo(() => products.filter(p => p._bucket === "review" || p._bucket === "rescued"), [products]);

  const dropSummary = useMemo(() => {
    const c = {};
    drops.forEach(d => { c[d._reason] = (c[d._reason]||0)+1; });
    return Object.entries(c).sort((a,b) => b[1]-a[1]);
  }, [drops]);

  const confirmRescue = (item, ruleType) => {
    onRescue(item);
    if (ruleType === "sku") {
      onSaveRule("sku", item.sku.toUpperCase(), { action: "upload", name: `Rescued: ${item.name.slice(0, 40)}` });
    } else if (ruleType === "class" && item.classCode) {
      onSaveRule("class", item.classCode.toUpperCase(), { action: "upload", name: item.className || item.classCode });
    } else if (ruleType === "vendor" && item.vendor) {
      onSaveRule("vendor", item.vendor.toUpperCase(), { action: "upload", name: item.vendor });
    }
    setRescuePrompt(null);
  };

  // Toggle an auto-approved item off (deselect it)

  return (
    <div>

        <div className="cb-title">

          <div className="cb-card cb-rev"><div className="cb-num">{reviewProducts.length}</div><div className="cb-label">Needs Review</div></div>

          <button className="btn-xs" onClick={() => setShowAuto(!showAuto)}>{showAuto ? "Hide" : "Show"}</button>
        </div>
        <p style={{ margin: "4px 0 0", fontSize: 12, color: "#57645c" }}>Matched by class, vendor, or SKU rules. Pre-selected for import. Deselect any you don't want.</p>
        {showAuto && (
          <div className="tw" style={{ maxHeight: 300, marginTop: 12 }}>

              <th style={{ width: 36 }}></th><th>SKU</th><th>Description</th><th>Vendor</th><th style={{ textAlign: "right" }}>Retail</th><th>Rule</th>
            </tr></thead>
              <tbody>{autoProducts.map(p => (
                <tr key={p.sku} className={p.selected ? "" : "row-off"} onClick={() => toggleAuto(p.sku)}>
                  <td onClick={e => e.stopPropagation()}><input type="checkbox" checked={p.selected} onChange={() => toggleAuto(p.sku)} /></td>
                  <td className="mono">{p.sku}</td>
                  <td style={{ maxWidth: 250, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{p.name}</td>
                  <td style={{ fontSize: 12, color: "#57645c" }}>{p.vendor}</td>
                  <td style={{ textAlign: "right" }} className="mono">${p.retailPrice.toFixed(2)}</td>

/* ═══════════════════════════════════════════════════
   STEP 2: Manual Review — dedicated step for review bucket
   ═══════════════════════════════════════════════════ */
function ReviewStep({ products, onUpdate, onNext, onBack, stats, onSaveRule }) {
  const [filter, setFilter] = useState("");
  const [vendorFilter, setVendorFilter] = useState("all");

  const reviewItems = useMemo(() => products.filter(p => p._bucket === "review" || p._bucket === "rescued"), [products]);
  const vendors = useMemo(() => [...new Set(reviewItems.map(p => p.vendor))].sort(), [reviewItems]);

  const filtered = useMemo(() => reviewItems.filter(p => {
    if (filter && !p.name.toLowerCase().includes(filter.toLowerCase()) && !p.sku.toLowerCase().includes(filter.toLowerCase())) return false;
    if (vendorFilter !== "all" && p.vendor !== vendorFilter) return false;
    return true;
  }), [reviewItems, filter, vendorFilter]);

  const selectedCount = reviewItems.filter(p => p.selected).length;
  const filteredSelected = filtered.filter(p => p.selected).length;
  const totalSelected = products.filter(p => p.selected).length;

  const toggleAll = (v) => {
    const s = new Set(filtered.map(p => p.sku));
    onUpdate(products.map(p => s.has(p.sku) ? { ...p, selected: v } : p));
  };
  const toggleOne = (sku) => onUpdate(products.map(p => p.sku === sku ? { ...p, selected: !p.selected } : p));

  // Bulk actions: select/skip all from a vendor and optionally save as rule
  const [bulkPrompt, setBulkPrompt] = useState(null);

  const bulkVendorAction = (vendor, action) => {
    onUpdate(products.map(p => {
      if ((p._bucket === "review" || p._bucket === "rescued") && p.vendor === vendor) {
        return { ...p, selected: action === "upload" };
      }
      return p;
    }));
  };

  const confirmBulkVendor = (vendor, action, saveRule) => {
    bulkVendorAction(vendor, action);
    if (saveRule) {
      onSaveRule("vendor", vendor.toUpperCase(), {
        action: action,
        name: vendor,
      });
    }
    setBulkPrompt(null);
  };

  // Vendor summary for quick actions
  const vendorSummary = useMemo(() => {
    const m = {};
    reviewItems.forEach(p => {
      if (!m[p.vendor]) m[p.vendor] = { total: 0, selected: 0 };
      m[p.vendor].total++;
      if (p.selected) m[p.vendor].selected++;
    });
    return Object.entries(m).sort((a,b) => b[1].total - a[1].total);
  }, [reviewItems]);

  return (
    <div>
      <div className="step-header">
        <div>
          <h2 style={{ margin: 0, fontSize: 20, color: "#1b231f" }}>Manual Review</h2>
          <p className="step-sub">{selectedCount} of {reviewItems.length} review items selected · {totalSelected} total for import</p>
        </div>
        <div style={{ display: "flex", gap: 8 }}>
          <button className="btn-outline" onClick={onBack}>← Back</button>
          <button className="btn-primary" onClick={onNext}>Next: Group Variations →</button>
        </div>
      </div>

      {/* Vendor quick-action chips */}
      <div className="panel" style={{ marginBottom: 16 }}>
        <h3 style={{ margin: "0 0 8px", fontSize: 14, color: "#57645c" }}>Quick Actions by Vendor</h3>
        <p style={{ margin: "0 0 12px", fontSize: 12, color: "#8a978f" }}>Click a vendor to select/skip all their items and optionally save as a permanent rule.</p>
        <div style={{ display: "flex", flexWrap: "wrap", gap: 6 }}>
          {vendorSummary.map(([v, s]) => (
            <button key={v} className="suggestion-chip" onClick={() => setBulkPrompt(v)}>
              <strong>{v}</strong>
              <span style={{ color: "#57645c", margin: "0 4px" }}>·</span>
              {s.total}
              {s.selected > 0 && <span style={{ color: "#15803d", marginLeft: 4, fontSize: 11 }}>({s.selected} ✓)</span>}
            </button>
          ))}
        </div>
      </div>

      {/* Bulk vendor prompt modal */}
      {bulkPrompt && (
        <div className="modal-overlay" onClick={() => setBulkPrompt(null)}>
          <div className="modal" onClick={e => e.stopPropagation()}>
            <h3 style={{ margin: "0 0 8px", color: "#1b231f", fontSize: 16 }}>{bulkPrompt}</h3>
            <p style={{ fontSize: 13, color: "#57645c", margin: "0 0 16px" }}>
              {vendorSummary.find(([v]) => v === bulkPrompt)?.[1]?.total || 0} items in review
            </p>
            <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
              <button className="btn-sm" onClick={() => confirmBulkVendor(bulkPrompt, "upload", false)} style={{ textAlign: "left" }}>
                ✅ Select all — just this time
              </button>
              <button className="btn-sm" onClick={() => confirmBulkVendor(bulkPrompt, "upload", true)} style={{ textAlign: "left" }}>
                ✅📌 Select all + save rule — always auto-upload <strong>{bulkPrompt}</strong>
              </button>
              <button className="btn-sm" onClick={() => confirmBulkVendor(bulkPrompt, "drop", false)} style={{ textAlign: "left" }}>
                ❌ Skip all — just this time
              </button>
              <button className="btn-sm" onClick={() => confirmBulkVendor(bulkPrompt, "drop", true)} style={{ textAlign: "left" }}>
                ❌📌 Skip all + save rule — always auto-drop <strong>{bulkPrompt}</strong>
              </button>
            </div>
            <button className="btn-outline" style={{ marginTop: 12, width: "100%" }} onClick={() => setBulkPrompt(null)}>Cancel</button>
          </div>
        </div>
      )}

      {/* Filter bar */}
      <div className="fbar">
        <input type="text" placeholder="Search name or SKU..." value={filter} onChange={e => setFilter(e.target.value)} className="fi" style={{ width: 220 }} />
        <select value={vendorFilter} onChange={e => setVendorFilter(e.target.value)} className="fi">
          <option value="all">All Vendors ({reviewItems.length})</option>
          {vendors.map(v => <option key={v} value={v}>{v} ({reviewItems.filter(p=>p.vendor===v).length})</option>)}
        </select>
        <button className="btn-sm" onClick={() => toggleAll(true)}>Select Shown ({filtered.length})</button>
        <button className="btn-sm btn-outline" onClick={() => toggleAll(false)}>Deselect Shown</button>
      </div>

      {/* Items table */}
      <div className="tw" style={{ maxHeight: "55vh" }}>
        <table className="tbl"><thead><tr>
          <th style={{ width: 36 }}><input type="checkbox" checked={filteredSelected === filtered.length && filtered.length > 0} onChange={e => toggleAll(e.target.checked)} /></th>
          <th>SKU</th><th>Description</th><th>Vendor</th>
          {stats.hasEnrichment && <th>Class</th>}
          <th style={{ textAlign: "right" }}>Retail</th><th style={{ textAlign: "right" }}>QOH</th>
        </tr></thead>
          <tbody>{filtered.slice(0, 400).map(p => (
            <tr key={p.sku} className={p.selected ? "" : "row-off"} onClick={() => toggleOne(p.sku)}>
              <td onClick={e => e.stopPropagation()}><input type="checkbox" checked={p.selected} onChange={() => toggleOne(p.sku)} /></td>
              <td className="mono">{p.sku}</td>
              <td style={{ maxWidth: 280, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{p.name}</td>
              <td style={{ fontSize: 12, color: "#57645c" }}>{p.vendor}</td>
              {stats.hasEnrichment && <td style={{ fontSize: 11, color: "#57645c" }}>{p.classCode}{p.className && ` · ${p.className}`}</td>}
              <td style={{ textAlign: "right" }} className="mono">${p.retailPrice.toFixed(2)}</td>
              <td style={{ textAlign: "right" }} className="mono">{p.qoh || "—"}</td>
            </tr>
          ))}</tbody>
        </table>
        {filtered.length > 400 && <div style={{ padding: 12, textAlign: "center", color: "#8a978f", fontSize: 13 }}>Showing 400 of {filtered.length}</div>}
      </div>
    </div>
  );
}


/* ═══════════════════════════════════════════════════
   STEP 3: Group Variations
   ═══════════════════════════════════════════════════ */
function GroupStep({ products, onUpdate, groups, setGroups, onNext, onBack }) {
  const selected = useMemo(() => products.filter(p=>p.selected), [products]);
  const ungrouped = useMemo(() => selected.filter(p=>!p.groupId), [selected]);
  const [searchTerm, setSearchTerm] = useState("");
  const [selectedSkus, setSelectedSkus] = useState(new Set());
  const [newGroupName, setNewGroupName] = useState("");
  const [newGroupType, setNewGroupType] = useState("color");
  const [editingGroup, setEditingGroup] = useState(null);
  const [autoSugg, setAutoSugg] = useState([]);
  const [varPrefs, setVarPrefs] = useState({});

  // Load saved variation preferences (vendor → {type, colorAttr, sizeAttr})
  useEffect(() => {
    (async () => {
      try {
        const r = await window.storage.get("ch-var-prefs");
        if (r && r.value) setVarPrefs(JSON.parse(r.value));
      } catch(e) {}
    })();
  }, []);

  const saveVarPref = (vendor, pref) => {
    setVarPrefs(prev => {
      const next = { ...prev, [vendor.toUpperCase()]: pref };
      window.storage.set("ch-var-prefs", JSON.stringify(next)).catch(()=>{});
      return next;
    });
  };

  // Smart detection: is the variant label a size, a color, or both?
  const SIZE_PATTERNS = /^(XXS|XS|S|M|L|XL|XXL|XXXL|2XL|3XL|4XL|5XL|ONE SIZE|OS|YOUTH|CHILD|ADULT|SM|MD|MED|LG|XLG|SMALL|MEDIUM|LARGE|X-SMALL|X-LARGE|XX-LARGE|XXX-LARGE|X-SM|X-LG|S\/M|M\/L|L\/XL|PONY|COB|HORSE|FULL|OVERSIZE|WARMBLOOD|DRAFT|WEANLING|YEARLING|FOAL|MINI|PETITE|REGULAR|TALL|SHORT|LONG|SLIM|WIDE|NARROW|EX WIDE|EXTRA WIDE|\d+['".]?\s*(REGULAR|LONG|SHORT|SLIM|WIDE)?|\d+\s*-\s*\d+|\d+\/\d+|\d+[A-Z]?R?L?S?|\d+\.\d+)$/i;
  const COLOR_WORDS = /^(BLACK|WHITE|BROWN|TAN|NAVY|BLUE|RED|GREEN|GREY|GRAY|PINK|PURPLE|ORANGE|YELLOW|BEIGE|CREAM|IVORY|CORAL|TEAL|BURGUNDY|WINE|CHARCOAL|CHOCOLATE|CHESTNUT|BAY|HUNTER|MIDNIGHT|ROYAL|DARK|LIGHT|HAVANA|OAK|COGNAC|SAGE|OLIVE|SLATE|STONE|PEWTER|SILVER|GOLD|ROSE|MAUVE|LILAC|PLUM|DENIM|CAMEL|ESPRESSO|MOCHA|SAND|STEEL|AQUA|MINT|LAVENDER|BLUSH|SMOKE|STORM|OCEAN|FOREST|AUTUMN|RUST|COPPER|BRONZE|MAHOGANY|WALNUT|NATURAL|CLASSIC|WHEAT|OATMEAL|ASH|GRAPHITE|JET|ONYX|PEARL|EGGPLANT|COBALT|INDIGO|SCARLET|CRIMSON|EMERALD|RUBY|SAPPHIRE|AMBER|CEDAR|DUSK|DAWN|FROST|ICE|CLOUD|SHADOW|RAVEN|EBONY|IRON|TITANIUM|PLATINUM|CHAMPAGNE|BONE|HONEY|APRICOT|PEACH|FAWN|TAUPE|TRUFFLE|COCOA|LATTE|CAPPUCCINO|MULBERRY|MAGENTA|ORCHID|VIOLET|PERIWINKLE|CORNFLOWER|SKY|HARBOR|MARINA|PACIFIC|ARCTIC|ALPINE|EVERGREEN|BASIL|MOSS|PINE|FERN|LIME|CITRUS|LEMON|CANARY|SUNFLOWER|MARIGOLD|TANGERINE|PUMPKIN|PAPRIKA|CAYENNE|SPICE|CINNAMON|SIENNA|TERRA|CLAY|BRICK|MERLOT)$/i;

  function detectVariationType(members, baseName, vendor) {
    // Check saved prefs first
    const pref = varPrefs[(vendor||"").toUpperCase()];
    if (pref && pref.type) return pref.type;

    const labels = members.map(m => extractVariantLabel(m.name, baseName).toUpperCase().trim()).filter(Boolean);
    if (labels.length === 0) return "color";

    // Check sizes first — if any label matches size, count it
    let sizeCount = 0, colorCount = 0;
    for (const l of labels) {
      // Test whole label and also first word
      if (SIZE_PATTERNS.test(l)) { sizeCount++; continue; }
      // Multi-word: check if first word is a color
      const firstWord = l.split(/[\s\/,-]+/)[0];
      if (COLOR_WORDS.test(firstWord)) colorCount++;
    }
    const sizeRatio = sizeCount / labels.length;
    const colorRatio = colorCount / labels.length;
    if (sizeRatio > 0.5 && colorRatio > 0.3) return "color-size";
    if (sizeRatio > 0.5) return "size";
    return "color";
  }

  // All available variation attributes for the override dropdown
  const ALL_VAR_ATTRS = [
    { id: "", label: "— Auto from category —" },
    { group: "Color Attributes", items: [
      { id: "color", label: "Color (generic)" },
      { id: "color_apparel", label: "Color (Apparel)" },
      { id: "color_gifts", label: "Color (Gifts)" },
      { id: "color_grooming", label: "Color (Grooming)" },
      { id: "color_healthcare", label: "Color (Health)" },
      { id: "color_horse_clothing", label: "Color (Horse Clothing)" },
      { id: "color_pet_livestock", label: "Color (Pet/Livestock)" },
      { id: "color_supplies", label: "Color (Supplies)" },
      { id: "color_tack", label: "Color (Tack)" },
    ]},
    { group: "Size Attributes", items: [
      { id: "size", label: "Size (generic)" },
      { id: "size_apparel", label: "Size (Apparel)" },
      { id: "size_feed", label: "Size (Feed)" },
      { id: "size_footwear", label: "Size (Footwear)" },
      { id: "size_gifts", label: "Size (Gifts)" },
      { id: "size_gloves", label: "Size (Gloves)" },
      { id: "size_grooming", label: "Size (Grooming)" },
      { id: "size_healthcare", label: "Size (Health)" },
      { id: "size_helmet", label: "Size (Helmet)" },
      { id: "size_hoof_boot", label: "Size (Hoof Boot)" },
      { id: "size_horse_clothing", label: "Size (Horse Clothing)" },
      { id: "size_pet_livestock", label: "Size (Pet/Livestock)" },
      { id: "size_supplements", label: "Size (Supplements)" },
      { id: "size_supplies", label: "Size (Supplies)" },
      { id: "size_tack", label: "Size (Tack)" },
    ]},
    { group: "Other", items: [
      { id: "weight", label: "Weight" },
      { id: "length", label: "Length" },
      { id: "width", label: "Width" },
      { id: "count", label: "Count" },
      { id: "flavor", label: "Flavor" },
      { id: "scent", label: "Scent" },
      { id: "general_variety", label: "Variety" },
      { id: "general_volume", label: "Volume" },
      { id: "style", label: "Style" },
      { id: "breech_type", label: "Type of Breech" },
      { id: "calf_width", label: "Calf Width" },
      { id: "helmet_liner_size", label: "Helmet Liner Size" },
      { id: "saddle_seat_size", label: "Saddle Seat Size" },
      { id: "pet_leash", label: "Pet Leash" },
      { id: "tack_style", label: "Tack Style" },
      { id: "tack_accent", label: "Tack Accent" },
    ]},
  ];

  function VarAttrSelect({ value, onChange, label }) {
    return <div><label className="fl">{label}</label><select className="fi" style={{width:"100%"}} value={value||""} onChange={e=>onChange(e.target.value)}>
      {ALL_VAR_ATTRS.map((item,i) => item.group
        ? <optgroup key={item.group} label={item.group}>{item.items.map(a=><option key={a.id} value={a.id}>{a.label}</option>)}</optgroup>
        : <option key={i} value={item.id}>{item.label}</option>
      )}
    </select></div>;
  }

  useEffect(() => {
    if (ungrouped.length<2){setAutoSugg([]);return;}
    const byP={};
    for(const p of ungrouped){const s=p.sku;for(let l=Math.max(3,s.length-3);l<s.length;l++){const px=s.slice(0,l);if(!byP[px])byP[px]=[];byP[px].push(p);}}
    const cands={};
    for(const[px,ms]of Object.entries(byP)){if(ms.length<2||ms.length>20)continue;const v=ms[0].vendor;if(!ms.every(m=>m.vendor===v))continue;const k=ms.map(m=>m.sku).sort().join("|");if(!cands[k]||px.length>cands[k].prefix.length)cands[k]={prefix:px,members:ms,vendor:v};}
    const suggestions = Object.values(cands).filter(c=>c.members.length>=2).sort((a,b)=>b.members.length-a.members.length).slice(0,15);
    for (const s of suggestions) {
      const bn = findCommonDescPrefix(s.members.map(m => m.name));
      s._detectedType = detectVariationType(s.members, bn, s.vendor);
      s._baseName = bn;
    }
    setAutoSugg(suggestions);
  }, [ungrouped, varPrefs]);

  const filtUng = useMemo(() => { if(!searchTerm) return ungrouped; const q=searchTerm.toLowerCase(); return ungrouped.filter(p=>p.sku.toLowerCase().includes(q)||p.name.toLowerCase().includes(q)); }, [ungrouped, searchTerm]);
  const toggleSku = s => setSelectedSkus(prev=>{const n=new Set(prev);n.has(s)?n.delete(s):n.add(s);return n;});

  const createGroup = () => {
    if(selectedSkus.size<2)return;
    const ms=selected.filter(p=>selectedSkus.has(p.sku));
    const gid=newGroupName?newGroupName.replace(/[^a-zA-Z0-9]/g,"-").toLowerCase():findCommonSkuPrefix(ms.map(m=>m.sku))||`group-${Date.now()}`;
    const bn=findCommonDescPrefix(ms.map(m=>m.name));
    const vt = newGroupType;
    setGroups(prev=>[...prev,{id:gid,displayName:newGroupName||titleCase(bn)||"Untitled Product",description:"",variationType:vt,brand:ms[0].vendor,tax:ms[0].tax,category:"",colorAttrOverride:"",sizeAttrOverride:""}]);
    onUpdate(products.map(p=>{if(!selectedSkus.has(p.sku))return p;const vl=extractVariantLabel(p.name,bn);return{...p,groupId:gid,variantValue:titleCase(vl),variantColor:vt!=="size"?titleCase(vl):"",variantSize:vt!=="color"?titleCase(vl):""};}));
    setSelectedSkus(new Set());setNewGroupName("");
  };

  const quickGroup = s => {
    const ss=new Set(s.members.map(m=>m.sku));
    const bn = s._baseName || findCommonDescPrefix(s.members.map(m=>m.name));
    const vendor = s.vendor;
    const pref = varPrefs[(vendor||"").toUpperCase()];
    const vt = pref?.type || s._detectedType || "color";
    const gid=s.prefix.replace(/[^a-zA-Z0-9]/g,"-").toLowerCase()||`group-${Date.now()}`;
    setGroups(prev=>[...prev,{id:gid,displayName:titleCase(bn)||titleCase(s.prefix),description:"",variationType:vt,brand:vendor,tax:s.members[0].tax,category:"",colorAttrOverride:pref?.colorAttr||"",sizeAttrOverride:pref?.sizeAttr||""}]);
    onUpdate(products.map(p=>{if(!ss.has(p.sku))return p;const vl=extractVariantLabel(p.name,bn);return{...p,groupId:gid,variantValue:titleCase(vl),variantColor:vt!=="size"?titleCase(vl):"",variantSize:vt!=="color"?titleCase(vl):""};}));
  };

  // Save variation type + attribute prefs for a vendor
  const saveGroupVarPref = (g) => {
    if (!g.brand) return;
    saveVarPref(g.brand, {
      type: g.variationType,
      colorAttr: g.colorAttrOverride || "",
      sizeAttr: g.sizeAttrOverride || "",
    });
  };

  const rmGroup = gid => {setGroups(prev=>prev.filter(g=>g.id!==gid));onUpdate(products.map(p=>p.groupId===gid?{...p,groupId:null,variantValue:"",variantColor:"",variantSize:""}:p));};

  return (
    <div>
      <div className="step-header">
        <div><h2 style={{margin:0,fontSize:20,color:"#1b231f"}}>Group Variations</h2><p className="step-sub">{groups.length} group{groups.length!==1?"s":""} · {ungrouped.length} ungrouped</p></div>
        <div style={{display:"flex",gap:8}}><button className="btn-outline" onClick={onBack}>← Back</button><button className="btn-primary" onClick={onNext}>Next: Edit →</button></div>
      </div>
      {autoSugg.length>0&&(<div className="panel" style={{marginBottom:16}}><h3 style={{margin:"0 0 4px",fontSize:15,color:"#1b231f"}}>🔍 Detected Groups</h3><p style={{margin:"0 0 12px",fontSize:13,color:"#57645c"}}>Shared prefix + vendor — click to group. Type auto-detected from variant labels.</p><div style={{display:"flex",flexWrap:"wrap",gap:8}}>{autoSugg.map((s,i)=><button key={i} className="suggestion-chip" onClick={()=>quickGroup(s)}><strong>{s.prefix}*</strong><span style={{color:"#57645c",margin:"0 4px"}}>·</span>{s.members.length}<span style={{color:"#57645c",margin:"0 4px"}}>·</span><span style={{color:"#57645c",fontSize:11}}>{s.vendor}</span><span className="badge-type" style={{marginLeft:6,fontSize:10}}>{s._detectedType||"color"}</span></button>)}</div></div>)}

      {groups.map(g=>{const ms=products.filter(p=>p.selected&&p.groupId===g.id);const isEd=editingGroup===g.id;return(
        <div key={g.id} className="gcard"><div className="ghead"><div>
          {isEd?<input className="fi" style={{fontSize:15,fontWeight:600,padding:"4px 8px",maxWidth:400}} value={g.displayName} onChange={e=>setGroups(prev=>prev.map(gg=>gg.id===g.id?{...gg,displayName:e.target.value}:gg))} />
          :<span style={{fontSize:15,fontWeight:600,color:"#1b231f"}}>{g.displayName}</span>}
          <span className="mono" style={{marginLeft:10,fontSize:11,color:"#8a978f"}}>Base: {g.id}x</span><span style={{marginLeft:8,fontSize:12,color:"#57645c"}}>{ms.length}v</span><span className="badge-type">{g.variationType}</span>
          {g.category && (() => { const va = getVariationAttrs(g.category); return <span style={{marginLeft:6,fontSize:10,color:"#8a978f"}}>→ {g.variationType!=="size"&&va.color}{g.variationType==="color-size"&&" + "}{g.variationType!=="color"&&va.size}</span>; })()}
        </div><div style={{display:"flex",gap:6}}><button className="btn-xs" onClick={()=>setEditingGroup(isEd?null:g.id)}>{isEd?"Done":"Edit"}</button><button className="btn-xs btn-danger" onClick={()=>rmGroup(g.id)}>Ungroup</button></div></div>
        {isEd&&<div style={{padding:"12px 16px",borderTop:"1px solid #dde4e0"}}>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:12,marginBottom:12}}>
          <div><label className="fl">Variation Type</label><select className="fi" style={{width:"100%"}} value={g.variationType} onChange={e=>setGroups(prev=>prev.map(gg=>gg.id===g.id?{...gg,variationType:e.target.value}:gg))}>{VARIATION_TYPES.map(t=><option key={t.id} value={t.id}>{t.label}</option>)}</select></div>
          <div><label className="fl">Category</label><CategorySelect value={g.category} onChange={v=>setGroups(prev=>prev.map(gg=>gg.id===g.id?{...gg,category:v}:gg))} /></div>
          <div style={{display:"flex",alignItems:"flex-end"}}><button className="btn-sm" style={{width:"100%"}} onClick={()=>saveGroupVarPref(g)} title="Save this type + attribute for all future groups from this vendor">📌 Remember for {g.brand}</button></div>
        </div>
        {(g.variationType==="color"||g.variationType==="color-size")&&<VarAttrSelect label="Color Attribute Override" value={g.colorAttrOverride||""} onChange={v=>setGroups(prev=>prev.map(gg=>gg.id===g.id?{...gg,colorAttrOverride:v}:gg))} />}
        {(g.variationType==="size"||g.variationType==="color-size")&&<VarAttrSelect label="Size Attribute Override" value={g.sizeAttrOverride||""} onChange={v=>setGroups(prev=>prev.map(gg=>gg.id===g.id?{...gg,sizeAttrOverride:v}:gg))} />}
        <label className="fl">Variant Values</label><div style={{display:"flex",flexWrap:"wrap",gap:6}}>{ms.map(m=><div key={m.sku} className="vchip"><span className="mono" style={{fontSize:10,color:"#8a978f"}}>{m.sku}</span><input className="vinput" value={m.variantValue} onChange={e=>onUpdate(products.map(p=>p.sku===m.sku?{...p,variantValue:e.target.value,variantColor:g.variationType!=="size"?e.target.value:p.variantColor,variantSize:g.variationType!=="color"?e.target.value:p.variantSize}:p))} /></div>)}</div></div>}
        {!isEd&&<div style={{padding:"8px 16px",display:"flex",flexWrap:"wrap",gap:6}}>{ms.map(m=><span key={m.sku} className="vtag">{m.variantValue||m.sku}</span>)}</div>}
      </div>);})}

      <div className="panel" style={{marginTop:16}}>
        <h3 style={{margin:"0 0 4px",fontSize:15,color:"#1b231f"}}>Manual Grouping</h3><p style={{margin:"0 0 12px",fontSize:13,color:"#57645c"}}>Select 2+ variant SKUs.</p>
        {selectedSkus.size>=2&&<div style={{display:"flex",gap:8,marginBottom:12,alignItems:"center",flexWrap:"wrap"}}><input className="fi" style={{maxWidth:280}} placeholder="Group name..." value={newGroupName} onChange={e=>setNewGroupName(e.target.value)} /><select className="fi" value={newGroupType} onChange={e=>setNewGroupType(e.target.value)}>{VARIATION_TYPES.map(t=><option key={t.id} value={t.id}>{t.label}</option>)}</select><button className="btn-primary" onClick={createGroup}>Create ({selectedSkus.size})</button><button className="btn-sm btn-outline" onClick={()=>setSelectedSkus(new Set())}>Clear</button></div>}
        <input className="fi" placeholder="Search ungrouped..." value={searchTerm} onChange={e=>setSearchTerm(e.target.value)} style={{marginBottom:10,width:"100%",maxWidth:400}} />
        <div className="tw" style={{maxHeight:350}}><table className="tbl"><thead><tr><th style={{width:36}}></th><th>SKU</th><th>Description</th><th>Vendor</th><th style={{textAlign:"right"}}>Retail</th></tr></thead>
          <tbody>{filtUng.slice(0,150).map(p=><tr key={p.sku} className={selectedSkus.has(p.sku)?"row-hl":""} onClick={()=>toggleSku(p.sku)}><td onClick={e=>e.stopPropagation()}><input type="checkbox" checked={selectedSkus.has(p.sku)} onChange={()=>toggleSku(p.sku)} /></td><td className="mono">{p.sku}</td><td style={{maxWidth:280,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{p.name}</td><td style={{fontSize:12,color:"#57645c"}}>{p.vendor}</td><td style={{textAlign:"right"}} className="mono">${p.retailPrice.toFixed(2)}</td></tr>)}</tbody></table></div>
      </div>
    </div>
  );
}

          <label className="fl">Description</label><textarea className="fi" style={{resize:"vertical",width:"100%"}} rows={2} value={g.description||""} onChange={e=>setGroups(prev=>prev.map(gg=>gg.id===g.id?{...gg,description:e.target.value}:gg))} placeholder="Description..." />
          <div style={{marginTop:10}}><label className="fl">Variants</label><div style={{display:"flex",flexWrap:"wrap",gap:6}}>{ms.map(m=><span key={m.sku} className="vtag">{m.variantValue||m.sku} <span className="mono" style={{fontSize:10,color:"#8a978f"}}>({m.sku})</span></span>)}</div></div>
        </div></div>);})}</div>}
      {view==="simple"&&simple.length>0&&p&&(
        <div className="elayout"><div className="esidebar">{simple.map((item,i)=><div key={item.sku} className={`si ${i===cur?"si-a":""} ${item.category?"si-c":""}`} onClick={()=>setCur(i)}><span className="mono" style={{fontSize:11,color:"#57645c",width:90,flexShrink:0}}>{item.sku}</span><span style={{fontSize:12,color:"#57645c",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",flex:1}}>{item.displayName}</span>{item.category&&<span style={{color:"#15803d",fontSize:14}}>✓</span>}</div>)}</div>
        <div className="eform"><div style={{maxWidth:700}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20,paddingBottom:16,borderBottom:"1px solid #dde4e0"}}><div><span className="mono" style={{fontSize:20,fontWeight:600,color:"#1b231f"}}>{p.sku}</span><span style={{marginLeft:12,background:"#dde4e0",padding:"4px 10px",borderRadius:5,fontSize:12,color:"#57645c"}}>{p.vendor}</span></div><div style={{display:"flex",alignItems:"center",gap:8}}><button disabled={cur===0} onClick={()=>setCur(cur-1)} className="btn-icon">←</button><span className="mono" style={{fontSize:13,color:"#8a978f"}}>{cur+1}/{simple.length}</span><button disabled={cur===simple.length-1} onClick={()=>setCur(cur+1)} className="btn-icon">→</button></div></div>

          <label className="fl">Short Description</label><textarea value={p.description} onChange={e=>upd(p.sku,"description",e.target.value)} className="fi" style={{resize:"vertical",width:"100%"}} rows={3} placeholder="Description..." />

/* ═══════════════════════════════════════════════════

   ═══════════════════════════════════════════════════ */
function ExportStep({ products, groups, onBack }) {
  const sel=useMemo(()=>products.filter(p=>p.selected),[products]);
  const simple=sel.filter(p=>!p.groupId); const catS=simple.filter(p=>p.category); const catG=groups.filter(g=>g.category);
  const [tab,setTab]=useState("catalog"); const [done,setDone]=useState(false);
  const catXml=useMemo(()=>generateCatalogXml(products,groups),[products,groups]);
  const pbXml=useMemo(()=>generatePricebookXml(products),[products]);
  const doExport=()=>{const d=new Date().toISOString().slice(0,10);downloadFile(catXml,`catalog-import-${d}.xml`);setTimeout(()=>downloadFile(pbXml,`pricebook-import-${d}.xml`),300);setDone(true);};
  const uc=simple.filter(p=>!p.category).length+groups.filter(g=>!g.category).length;

  return (
    <div>
      <div className="step-header"><div><h2 style={{margin:0,fontSize:20,color:"#1b231f"}}>Review & Export</h2><p className="step-sub">{sel.length} products · {groups.length} groups</p></div><div style={{display:"flex",gap:8}}><button className="btn-outline" onClick={onBack}>← Back</button><button className="btn-export" onClick={doExport}>{done?"✓ Downloaded":"Download Import Files"}</button></div></div>
      {uc>0&&<div className="warn">⚠ {uc} item{uc>1?"s":""} without a category.</div>}
      <div style={{display:"grid",gridTemplateColumns:"280px 1fr",gap:20,marginBottom:28}}>
        <div className="panel"><h3 style={{margin:"0 0 12px",fontSize:16,color:"#1b231f"}}>Summary</h3><div className="srows"><div className="srow"><span>Simple</span><span className="sv">{simple.length}</span></div><div className="srow"><span>Groups</span><span className="sv">{groups.length}</span></div><div className="srow"><span>Variant SKUs</span><span className="sv">{sel.filter(p=>p.groupId).length}</span></div><div className="srow"><span>Categorized</span><span className="sv" style={{color:"#15803d"}}>{catS.length+catG.length}</span></div><div className="srow"><span>Uncategorized</span><span className="sv" style={{color:uc>0?"#f97316":"#15803d"}}>{uc}</span></div></div></div>
        <div className="panel" style={{padding:0,overflow:"hidden"}}><div style={{display:"flex",borderBottom:"1px solid #dde4e0"}}><button className={`tab ${tab==="catalog"?"active":""}`} onClick={()=>setTab("catalog")}>Catalog XML</button><button className={`tab ${tab==="pricebook"?"active":""}`} onClick={()=>setTab("pricebook")}>Price Book XML</button></div><pre style={{padding:16,margin:0,fontFamily:"'SF Mono',Menlo,Consolas,monospace",fontSize:11,lineHeight:1.6,color:"#57645c",maxHeight:400,overflow:"auto",whiteSpace:"pre-wrap",wordBreak:"break-all"}}>{(tab==="catalog"?catXml:pbXml).slice(0,4000)}{(tab==="catalog"?catXml:pbXml).length>4000&&"\n\n... (truncated)"}</pre></div>
      </div>
      <h3 style={{fontSize:18,color:"#1b231f",margin:"0 0 16px"}}>Import into Business Manager</h3>
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(260px,1fr))",gap:12}}>{[{n:1,t:"Upload Catalog XML",d:"Administration → Site Development → Import & Export"},{n:2,t:"Import Catalog",d:"Select file, MERGE mode. Creates products + variations."},{n:3,t:"Import Price Book",d:"Upload and import pricebook XML, MERGE mode."},{n:4,t:"Verify",d:"Search imported SKUs in staging. Check variations and pricing."}].map(s=><div key={s.n} style={{display:"flex",gap:14,background:"#ffffff",border:"1px solid #dde4e0",borderRadius:10,padding:16}}><span style={{width:28,height:28,flexShrink:0,background:"#056A45",color:"#fff",borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",fontSize:13,fontWeight:700}}>{s.n}</span><div><strong style={{color:"#1b231f",fontSize:14,display:"block",marginBottom:4}}>{s.t}</strong><p style={{color:"#57645c",fontSize:13,margin:0,lineHeight:1.5}}>{s.d}</p></div></div>)}</div>
    </div>
  );
}


/* ═══════════════════════════════════════════════════
   Rules Manager Panel
   ═══════════════════════════════════════════════════ */
function RulesPanel({ rules, onSaveRule, onDeleteRule }) {
  const [newType, setNewType] = useState("class");
  const [newKey, setNewKey] = useState("");
  const [newAction, setNewAction] = useState("upload");
  const [newName, setNewName] = useState("");
  const addRule = () => {
    if (!newKey.trim()) return;
    onSaveRule(newType, newKey.trim().toUpperCase(), { action: newAction, name: newName || newKey.trim() });
    setNewKey(""); setNewName("");
  };
  const sections = [
    { key: "classRules", label: "Class Rules", type: "class" },
    { key: "deptRules", label: "Department Rules", type: "dept" },
    { key: "vendorRules", label: "Vendor Rules", type: "vendor" },
    { key: "skuRules", label: "SKU Overrides", type: "sku" },
    { key: "prefixRules", label: "Prefix Rules", type: "prefix" },
  ];

  return (
    <div>
      <h2 style={{ margin: "0 0 8px", fontSize: 20, color: "#1b231f" }}>Rules Manager</h2>
      <p className="step-sub" style={{ marginBottom: 20 }}>Rules persist across sessions. They control how the cascade classifies items on upload.</p>
      <div className="panel" style={{ marginBottom: 20 }}>
        <h3 style={{ margin: "0 0 12px", fontSize: 15, color: "#1b231f" }}>Add Rule</h3>
        <div style={{ display: "flex", gap: 8, alignItems: "center", flexWrap: "wrap" }}>
          <select className="fi" value={newType} onChange={e => setNewType(e.target.value)}>
            <option value="class">Class</option><option value="dept">Department</option><option value="vendor">Vendor</option><option value="sku">SKU</option><option value="prefix">Prefix</option>
          </select>
          <input className="fi" placeholder="Code/ID..." value={newKey} onChange={e => setNewKey(e.target.value)} style={{ width: 160 }} />
          <select className="fi" value={newAction} onChange={e => setNewAction(e.target.value)}>
            <option value="upload">Auto-upload</option><option value="drop">Auto-drop</option>
          </select>
          <input className="fi" placeholder="Label (optional)..." value={newName} onChange={e => setNewName(e.target.value)} style={{ width: 200 }} />
          <button className="btn-primary" onClick={addRule} disabled={!newKey.trim()}>Add</button>
        </div>
      </div>
      {sections.map(sec => {
        const entries = Object.entries(rules[sec.key] || {});
        if (!entries.length) return null;
        return (
          <div key={sec.key} style={{ marginBottom: 16 }}>
            <h3 style={{ margin: "0 0 8px", fontSize: 14, color: "#57645c" }}>{sec.label} ({entries.length})</h3>
            <div style={{ display: "flex", flexWrap: "wrap", gap: 6 }}>
              {entries.sort((a,b) => a[0].localeCompare(b[0])).map(([code, rule]) => (
                <span key={code} className={rule.action === "upload" ? "rule-chip-up" : "rule-chip-drop"}>
                  <strong>{code}</strong> · {rule.name} · {rule.action}
                  <button onClick={() => onDeleteRule(sec.key, code)} style={{ background: "none", border: "none", color: "#57645c", cursor: "pointer", marginLeft: 6, fontSize: 14, padding: 0 }}>×</button>
                </span>
              ))}
            </div>
          </div>
        );
      })}
    </div>
  );
}

    const ruleKey = { class: "classRules", dept: "deptRules", vendor: "vendorRules", sku: "skuRules", prefix: "prefixRules" }[type];

        .ch-back{font-size:12px;color:rgba(255,255,255,.85);text-decoration:none;border:1px solid rgba(255,255,255,.35);padding:6px 12px;border-radius:6px;white-space:nowrap}
        .ch-back:hover{background:rgba(255,255,255,.15)}
        .fi{background:#ffffff;border:1px solid #b9c6bf;color:#1b231f;padding:8px 12px;border-radius:7px;font-size:13px;font-family:inherit;outline:none;box-sizing:border-box}
        .fi:focus{border-color:#056A45}.iw{border-color:#f97316}
        .fl{display:block;font-size:11px;font-weight:500;color:#57645c;text-transform:uppercase;letter-spacing:.5px;margin:14px 0 5px}
        .fv{font-size:14px;color:#1b231f}
        .fbar{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:16px;padding:12px 16px;background:#eef2ef;border:1px solid #dde4e0;border-radius:10px}
        .tw{overflow:auto;border:1px solid #dde4e0;border-radius:10px}
        .tbl{width:100%;border-collapse:collapse;font-size:13px}
        .tbl thead{position:sticky;top:0;z-index:1}
        .tbl th{background:#ffffff;color:#57645c;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;padding:10px 12px;text-align:left;border-bottom:1px solid #dde4e0}
        .tbl td{padding:8px 12px;border-bottom:1px solid #eef2ef;color:#1b231f}
        .tbl tbody tr{cursor:pointer;transition:background .1s}
        .tbl tbody tr:hover{background:#eef2ef}
        .row-off{opacity:.35}.row-hl{background:rgba(5,106,69,.08)!important}
        .mono{font-family:'SF Mono',Menlo,Consolas,monospace;font-size:12px}
        .badge-au{background:rgba(21,128,61,.12);color:#15803d;padding:3px 8px;border-radius:4px;font-size:11px;font-weight:500}
        .badge-rv{background:rgba(26,111,163,.12);color:#1a6fa3;padding:3px 8px;border-radius:4px;font-size:11px;font-weight:500}
        .badge-type{background:rgba(107,79,160,.12);color:#6b4fa0;padding:3px 8px;border-radius:4px;font-size:11px;font-weight:500;margin-left:8px}
        .panel{background:#ffffff;border:1px solid #dde4e0;border-radius:10px;padding:16px}
        .dz{border:2px dashed #b9c6bf;border-radius:12px;padding:40px;text-align:center;cursor:pointer;transition:all .2s;max-width:480px;margin:0 auto;display:flex;flex-direction:column;align-items:center}
        .dz:hover,.dz-a{border-color:#056A45;background:rgba(5,106,69,.06)}
        .suggestion-chip{background:#eef2ef;border:1px solid #b9c6bf;color:#1b231f;padding:6px 14px;border-radius:20px;font-size:12px;cursor:pointer;font-family:inherit;transition:all .15s;display:inline-flex;align-items:center}
        .suggestion-chip:hover{border-color:#056A45;background:rgba(5,106,69,.06)}
        .gcard{background:#ffffff;border:1px solid #dde4e0;border-radius:10px;margin-bottom:10px;overflow:hidden}
        .ghead{display:flex;justify-content:space-between;align-items:center;padding:12px 16px;border-bottom:1px solid #dde4e0}
        .vtag{background:#dde4e0;color:#57645c;padding:4px 10px;border-radius:5px;font-size:12px;display:inline-flex;align-items:center;gap:4px}
        .vchip{background:#eef2ef;border:1px solid #dde4e0;border-radius:6px;padding:6px 10px;display:flex;flex-direction:column;gap:4px}
        .vinput{background:#ffffff;border:1px solid #b9c6bf;color:#1b231f;padding:4px 8px;border-radius:4px;font-size:12px;font-family:inherit;outline:none;width:120px}
        .vinput:focus{border-color:#056A45}
        .elayout{display:flex;gap:0;height:calc(100vh - 200px);border:1px solid #dde4e0;border-radius:12px;overflow:hidden}
        .esidebar{width:300px;flex-shrink:0;background:#ffffff;border-right:1px solid #dde4e0;overflow-y:auto}
        .si{display:flex;align-items:center;gap:8px;padding:7px 14px;cursor:pointer;transition:background .1s;border-left:3px solid transparent}
        .si:hover{background:#eef2ef}.si-a{background:#e3f3ec;border-left-color:#056A45}.si-c .mono{color:#15803d!important}
        .eform{flex:1;padding:20px;background:#eef2ef;overflow-y:auto}
        .tab{padding:10px 20px;font-size:13px;font-weight:500;color:#57645c;background:none;border:none;cursor:pointer;font-family:inherit;border-bottom:2px solid transparent}
        .tab.active{color:#056A45;border-bottom-color:#056A45}.tab:hover{color:#57645c}
        .srows{display:flex;flex-direction:column}
        .srow{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid #dde4e0;font-size:13px;color:#57645c}
        .sv{font-family:'SF Mono',Menlo,Consolas,monospace;color:#1b231f}
        .warn{background:rgba(249,115,22,.08);border:1px solid rgba(249,115,22,.2);border-radius:10px;padding:12px 18px;font-size:14px;color:#92651b;margin-bottom:20px}
        .rule-chip-up{background:rgba(21,128,61,.1);color:#15803d;padding:4px 10px;border-radius:6px;font-size:12px;display:inline-flex;align-items:center;gap:4px}
        .rule-chip-drop{background:rgba(192,57,43,.1);color:#a32d2d;padding:4px 10px;border-radius:6px;font-size:12px;display:inline-flex;align-items:center;gap:4px}
        .modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.6);display:flex;align-items:center;justify-content:center;z-index:100}
        .modal{background:#ffffff;border:1px solid #b9c6bf;border-radius:12px;padding:24px;max-width:480px;width:90%}
        .cat-trigger{min-height:36px}
        .cat-dropdown{position:absolute;top:100%;left:0;right:0;z-index:50;background:#ffffff;border:1px solid #b9c6bf;border-radius:10px;margin-top:4px;box-shadow:0 12px 40px rgba(0,0,0,.5);min-width:300px;max-width:420px}
        .cat-search{width:100%;border:none;border-bottom:1px solid #dde4e0;border-radius:10px 10px 0 0;padding:10px 12px;font-size:13px}
        .cat-tree{max-height:320px;overflow-y:auto;padding:4px 0}
        .cat-node{display:flex;align-items:center;gap:6px;padding:5px 8px;cursor:pointer;transition:background .1s;font-size:13px;color:#1b231f;min-height:28px}
        .cat-node:hover{background:#e3f3ec}
        .cat-sel{background:rgba(5,106,69,.12)!important;color:#056A45}
        .cat-clear:hover{background:rgba(192,57,43,.08)!important}
        .cat-arrow{color:#8a978f;font-size:11px;width:14px;text-align:center;flex-shrink:0;cursor:pointer}
        .cat-arrow:hover{color:#57645c}
        .cat-dot{color:#b9c6bf;font-size:8px;width:14px;text-align:center;flex-shrink:0}
        .cat-lbl{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
        .cat-pick{background:none;border:1px solid #b9c6bf;color:#8a978f;width:20px;height:20px;border-radius:4px;font-size:10px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;opacity:0;transition:opacity .15s}
        .cat-node:hover .cat-pick{opacity:1}
        .cat-pick:hover{border-color:#056A45;color:#056A45;background:rgba(5,106,69,.10)}
        ::-webkit-scrollbar{width:6px;height:6px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:#b9c6bf;border-radius:3px}
        select option,select optgroup{background:#ffffff;color:#1b231f}
        @media(max-width:800px){.elayout{flex-direction:column;height:auto}.esidebar{width:100%;max-height:200px;border-right:none;border-bottom:1px solid #dde4e0}}
      `}</style>

      <header className="app-header">
        <img src="../../assets/logo-white.svg" alt="Cheshire Horse" style={{ height: 24, width: "auto", display: "block" }} />
        <span style={{ opacity: 0.4, fontSize: 13, fontWeight: 300 }}>|</span>
        <span className="app-title">SKU Onboarder</span>
        <span className="app-sub">SFCC Import Tool</span>
        <div style={{ marginLeft: "auto", display: "flex", gap: 8, alignItems: "center" }}>
          <a href="../../index.html" className="ch-back">&larr; All tools</a>
          <button className="btn-rules" onClick={() => setShowRules(!showRules)}>
            ⚙ Rules {showRules ? "▾" : "▸"}
          </button>
        </div>
      </header>

      {!showRules && (
        <div className="stepper">
          {steps.map((label, i) => (
            <div key={i} style={{ display: "flex", alignItems: "center" }}>
              {i > 0 && <span className="sc">›</span>}
              <div className={`sd ${i === step ? "active" : i < step ? "done" : ""}`} onClick={() => { if (i < step) setStep(i); }} style={{ cursor: i < step ? "pointer" : "default" }}>
                <span className="sn">{i < step ? "✓" : i + 1}</span>{label}
              </div>
            </div>
          ))}
        </div>
      )}

      <div className="app-content">
        {showRules ? (
          <RulesPanel rules={rules} onSaveRule={handleSaveRule} onDeleteRule={handleDeleteRule} />
        ) : (
          <>
            {step === 0 && <UploadStep onData={handleUpload} rules={rules} rulesLoaded={rulesLoaded} />}
            {step === 1 && <CascadeStep products={products} drops={drops} stats={stats} onUpdate={setProducts} onNext={() => setStep(2)} rules={rules} onSaveRule={handleSaveRule} onRescue={handleRescue} />}
            {step === 2 && <ReviewStep products={products} onUpdate={setProducts} onNext={() => setStep(3)} onBack={() => setStep(1)} stats={stats} onSaveRule={handleSaveRule} />}
            {step === 3 && <GroupStep products={products} onUpdate={setProducts} groups={groups} setGroups={setGroups} onNext={() => setStep(4)} onBack={() => setStep(2)} />}
            {step === 4 && <EditStep products={products} onUpdate={setProducts} groups={groups} setGroups={setGroups} onNext={() => setStep(5)} onBack={() => setStep(3)} />}
            {step === 5 && <ExportStep products={products} groups={groups} onBack={() => setStep(4)} />}
          </>
        )}
      </div>
    </div>
  );
}

if (!window.storage) {
  window.storage = {
    async get(key) { try { const v = localStorage.getItem(key); return v !== null ? { key, value: v, shared: false } : null; } catch(e) { return null; } },
    async set(key, value) { try { localStorage.setItem(key, value); return { key, value, shared: false }; } catch(e) { return null; } },
    async delete(key) { try { localStorage.removeItem(key); return { key, deleted: true, shared: false }; } catch(e) { return null; } },
    async list(prefix) { try { const keys = []; for (let i = 0; i < localStorage.length; i++) { const k = localStorage.key(i); if (!prefix || k.startsWith(prefix)) keys.push(k); } return { keys, shared: false }; } catch(e) { return { keys: [], shared: false }; } }
  };
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(SKUOnboarder));
</script>
</body>
</html>
